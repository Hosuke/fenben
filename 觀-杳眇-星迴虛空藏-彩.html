<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>星迴・虛空藏・初彩</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0d1124; overscroll-behavior: none; }
  canvas { display: block; width: 100vw; height: 100vh; height: 100dvh; cursor: grab; touch-action: none; -webkit-user-select: none; user-select: none; }
  canvas.拖 { cursor: grabbing; }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script type="module">
// 杳眇《星迴・虛空藏・初彩》試色之頁——三場至簡：珠暉（明星光入）・身暈月白・玄青大場（虛空自珠而深）。
// 線層一筆未動；彩層 destination-over 居線下（線骨恆上），末以底色收虛。
// 研色卷：docs/考據/研色-杳眇.md。
import { 掛觀 } from './tools/lib/觀具.js';
import { 景, 飾 } from './匠筆-codex/風格館/杳眇-星迴虛空藏-框飾層.js';
import { 尊位, 尊, 修 } from './匠筆-主坊/風格館/杳眇-星迴虛空藏-尊身層.js';
import { 彩 } from './匠筆-主坊/風格館/杳眇-星迴虛空藏-彩層.js';

const cv = document.getElementById('cv');
const 助 = { W: 尊位.W, H: 尊位.H, 尊位 };

掛觀(cv, async (ctx, 變換) => {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.setTransform(...變換);
  await 景(ctx, 助);
  await 尊(ctx, 助);
  await 飾(ctx, 助);
  await 修(ctx, 助);
  彩(ctx, 助);

  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'destination-over';
  ctx.fillStyle = '#0d1124';
  ctx.fillRect(0, 0, cv.width, cv.height);
  ctx.restore();
}, { 寬: 尊位.W, 高: 尊位.H });
</script>
</body>
</html>
