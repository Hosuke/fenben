<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>四題競本白描 · Haiku 4.5</title>
  <style>
    body { margin: 0; padding: 20px; background: #0a0e27; color: #ccc; font-family: "Noto Sans CJK SC", serif; }
    .container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    .canvas-box { text-align: center; }
    canvas { border: 1px solid #444; background: #0a0e27; display: block; margin: 10px auto; }
    h3 { margin: 10px 0 0 0; color: #d4af37; font-size: 14px; font-weight: normal; }
    .info { font-size: 12px; color: #999; margin-top: 5px; }
  </style>
</head>
<body>
  <h1 style="text-align: center; margin-bottom: 30px;">四題競本白描（Haiku 4.5 落筆）</h1>

  <div class="container">
    <!-- 題一：智拳印獨幅 -->
    <div class="canvas-box">
      <canvas id="canvas1" width="400" height="400"></canvas>
      <h3>①智拳印獨幅</h3>
      <div class="info">左拳立頭指·右拳握之·右拇端拄左頭指端</div>
    </div>

    <!-- 題二：大日如來坐像 -->
    <div class="canvas-box">
      <canvas id="canvas2" width="400" height="480"></canvas>
      <h3>②大日如來·金剛界</h3>
      <div class="info">菩薩形·五智寶冠·智拳印·蓮座</div>
    </div>

    <!-- 題三：金剛薩埵 -->
    <div class="canvas-box">
      <canvas id="canvas2b" width="400" height="480"></canvas>
      <h3>③金剛薩埵</h3>
      <div class="info">五佛冠·五鈷杵·五鈷鈴·蓮座</div>
    </div>

    <!-- 題四：五鈷杵三昧耶形 -->
    <div class="canvas-box">
      <canvas id="canvas3" width="400" height="400"></canvas>
      <h3>④五鈷杵三昧耶形</h3>
      <div class="info">把·鬼目·蓮弁帯·中鈷直·脇鈷嘴形·蓮座</div>
    </div>
  </div>

  <div style="margin-top: 40px; color: #666; font-size: 12px; max-width: 1400px;">
    <p>格網錨點（指）：白毫12·頦20·心窩36·臍48·盤線64·座面68·膝寬52·膊20·臂16·手12·膝寬52</p>
    <p style="color: #555;">線身比 1:150 白描無填·畫序即遮擋序（destination-out）·面簡筆</p>
  </div>

  <script>
    // ════════════════════════════════════════════════════════════════════════════════
    // 格網與量度自證
    // ════════════════════════════════════════════════════════════════════════════════
    const 格網 = {
      菩薩: { 搩: 10, 指: 120 },
      坐高: 68,
      白毫: 12,
      頦: 20,
      心窩: 36,
      臍: 48,
      陰藏: 60,
      盤線: 64,
      座面: 68,
      膝寬: 52,
      膊: 20,
      臂: 16,
      手: 12,
    };

    // 量度誦戒
    console.assert(格網.盤線 - 格網.白毫 === 格網.膝寬, '盤線至白毫之距≠膝寬', 格網);
    console.assert(格網.盤線 === 格網.陰藏 + 4, '盤線≠陰藏+4', 格網);
    console.assert(格網.座面 === 格網.盤線 + 4, '座面≠盤線+4', 格網);
    console.assert(格網.陰藏 === 60, '陰藏≠60', 格網);
    console.log('✓ 量度誦戒過——格網無誤');

    // ════════════════════════════════════════════════════════════════════════════════
    // 筆具（基於主坊之制）
    // ════════════════════════════════════════════════════════════════════════════════
    class 筆具 {
      constructor(ctx, R) {
        this.ctx = ctx;
        this.R = R;
        this.u = R * 0.0145;  // 一指之長
        this.yT = -R * 0.565; // 頂之縱座標（坐像微沉）
        this.Y = (z) => this.yT + z * this.u;  // 縱錨函數
        this.W_OUT = R * 0.0285;  // 骨線之寬
        this.W_IN = R * 0.0163;   // 鬚線之寬
        ctx.strokeStyle = '#d4af37';
        ctx.fillStyle = '#d4af37';
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
      }

      // 折線
      P(pts, close = false) {
        this.ctx.beginPath();
        pts.forEach(([x, z], i) => {
          if (i === 0) this.ctx.moveTo(x * this.u, this.Y(z));
          else this.ctx.lineTo(x * this.u, this.Y(z));
        });
        if (close) this.ctx.closePath();
        this.ctx.stroke();
      }

      // 二次曲線
      Q(x0, z0, cx, cz, x1, z1) {
        this.ctx.beginPath();
        this.ctx.moveTo(x0 * this.u, this.Y(z0));
        this.ctx.quadraticCurveTo(cx * this.u, this.Y(cz), x1 * this.u, this.Y(z1));
        this.ctx.stroke();
      }

      // 三次貝塞爾曲線
      B(x0, z0, c1x, c1z, c2x, c2z, x1, z1) {
        this.ctx.beginPath();
        this.ctx.moveTo(x0 * this.u, this.Y(z0));
        this.ctx.bezierCurveTo(c1x * this.u, this.Y(c1z), c2x * this.u, this.Y(c2z), x1 * this.u, this.Y(z1));
        this.ctx.stroke();
      }

      // 圓弧
      A(x, z, r, a0 = 0, a1 = 2 * Math.PI) {
        this.ctx.beginPath();
        this.ctx.arc(x * this.u, this.Y(z), r * this.u, a0, a1);
        this.ctx.stroke();
      }

      // 橢圓
      E(x, z, rx, rz, rot = 0) {
        this.ctx.beginPath();
        this.ctx.ellipse(x * this.u, this.Y(z), rx * this.u, rz * this.u, rot, 0, 2 * Math.PI);
        this.ctx.stroke();
      }

      // 實點（眸子、白毫等）
      dot(x, z, r) {
        this.ctx.beginPath();
        this.ctx.arc(x * this.u, this.Y(z), r * this.u, 0, 2 * Math.PI);
        this.ctx.fill();
      }

      // 以鬚線行之（細線）
      thin(fn) {
        this.ctx.save();
        this.ctx.lineWidth = this.W_IN;
        fn();
        this.ctx.restore();
      }

      // 調淡墨
      dim(alpha, fn) {
        this.ctx.save();
        this.ctx.globalAlpha *= alpha;
        fn();
        this.ctx.restore();
      }

      // 設置線寬
      setWidth(w) {
        this.ctx.lineWidth = w;
      }
    }

    // ════════════════════════════════════════════════════════════════════════════════
    // 題一：智拳印獨幅
    // ════════════════════════════════════════════════════════════════════════════════
    function 畫智拳印(canvasId) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const R = canvas.width / 2 - 20;
      const bi = new 筆具(ctx, R);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.translate(canvas.width / 2, canvas.height / 2);

      bi.setWidth(bi.W_OUT);

      // 左拳：金剛拳，豎立頭指（食指）
      // 左拳握部（掌根處）
      bi.Q(-8, -5, -6, 2, -5, 8);      // 左掌邊
      bi.Q(-8, -5, -10, 0, -12, 5);    // 左掌背
      bi.Q(-12, 5, -12, 15, -8, 20);   // 左掌尾
      bi.Q(-8, 20, -3, 22, 2, 20);     // 左掌下緣
      bi.Q(2, 20, 2, 12, 0, 8);        // 左掌內
      bi.Q(0, 8, -4, 6, -5, 0);        // 掌根回

      // 左拳四指握（四橫段之勢）
      bi.P([[-6, 0], [-8, 3], [-10, 5]], false);   // 小指
      bi.P([[-4, -2], [-6, 2], [-8, 6]], false);   // 無名指
      bi.P([[-2, -3], [-4, 1], [-6, 7]], false);   // 中指

      // 左拳頭指（食指）豎立——逐節清晰
      // 三節指：指根12、指間14、指尖16（單位自指之比例）
      bi.thin(() => {
        bi.B(-1, 8, -1.5, 12, -2, 15, -2.5, 20);   // 指根至指間
        bi.B(-2.5, 20, -3, 24, -2, 28, -1, 32);    // 指間至指尖
      });
      bi.B(-1, 8, -1, 12, -0.5, 15, 0, 20);      // 指甲背面
      bi.B(0, 20, 1, 24, 1, 28, 0.5, 32);        // 指尖側線
      bi.B(-1, 8, 0, 10, 1, 15, 2, 20);          // 指掌側線

      // 右拳：金剛拳握左拳頭指——右大指端拄左頭指端
      // 右拳握部（從右上方握來）
      bi.Q(8, -3, 12, 0, 14, 5);       // 右掌背
      bi.Q(14, 5, 16, 10, 14, 18);     // 右掌邊
      bi.Q(14, 18, 8, 20, 2, 18);      // 右掌下緣（握左指）
      bi.Q(2, 18, 2, 12, 4, 8);        // 右掌內緣
      bi.Q(4, 8, 6, 5, 8, 0);          // 掌根回

      // 右拳四指握（四橫段）
      bi.P([[6, 2], [10, 5], [12, 9]], false);    // 小指
      bi.P([[8, 0], [12, 3], [14, 8]], false);    // 無名指
      bi.P([[10, -2], [14, 1], [16, 7]], false);  // 中指

      // 右大指端拄左頭指端——逐節清晰
      bi.thin(() => {
        bi.B(10, 10, 12, 14, 8, 20, 2, 28);     // 大指：指根→指尖，拄左頭指端
        bi.B(10, 10, 10, 15, 6, 22, 1, 30);     // 大指側線
      });

      // 拳心印紋（示意）
      bi.thin(() => {
        bi.P([[-4, 4], [-2, 6], [-4, 8]], false);
      });
    }

    // ════════════════════════════════════════════════════════════════════════════════
    // 題二：大日如來坐像
    // ════════════════════════════════════════════════════════════════════════════════
    function 畫大日如來(canvasId) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const R = canvas.width / 2 - 20;
      const bi = new 筆具(ctx, R);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.translate(canvas.width / 2, canvas.height / 2);

      bi.setWidth(bi.W_OUT);

      // 月輪
      bi.dim(0.3, () => {
        bi.A(0, 0, R * 0.45);
      });

      // 蓮座（半蓮瓣，八瓣）
      const 瓣數 = 8;
      for (let i = 0; i < 瓣數; i++) {
        const 角 = (i / 瓣數) * Math.PI * 2 - Math.PI / 2;
        const x0 = Math.cos(角) * 28;
        const z0 = 28 + Math.sin(角) * 8;
        bi.Q(x0 - 2, z0, x0, z0 + 3, x0 + 2, z0);  // 瓣
      }
      bi.A(0, 28, 26);  // 座邊

      // 身軀：菩薩形
      // 頭部（圓形，簡筆）
      bi.A(0, -2, 4.5);  // 臉圓

      // 五智寶冠（示意）
      bi.thin(() => {
        bi.A(0, -6, 5.5);        // 冠邊
        bi.P([[-3, -8], [0, -10], [3, -8]], false);  // 中峰
        bi.P([[-5, -7.5], [-3, -9]], false);         // 左峰
        bi.P([[5, -7.5], [3, -9]], false);           // 右峰
      });

      // 頸與肩（曲線）
      bi.Q(0, -2, -1, 1, -6, 5);      // 左肩
      bi.Q(0, -2, 1, 1, 6, 5);        // 右肩

      // 胸部與智拳印
      bi.Q(-6, 5, -8, 12, -7, 18);    // 左臂上行
      bi.Q(6, 5, 8, 12, 7, 18);       // 右臂上行

      // 胸膛中線
      bi.thin(() => {
        bi.P([[0, 5], [0, 25]], false);  // 中線
      });

      // 腋下褶
      bi.thin(() => {
        bi.Q(-6, 5, -10, 10, -8, 18);
        bi.Q(6, 5, 10, 10, 8, 18);
      });

      // 智拳印（胸前）
      // 簡化版：雙手結印
      bi.thin(() => {
        // 左拳（內側）
        bi.A(-3, 15, 2);
        bi.P([[-4, 13], [-3, 17]], false);  // 豎指

        // 右拳（外側）
        bi.A(3, 15, 2);
        bi.P([[3, 13], [4, 17]], false);
      });

      // 腰部與裙褶
      bi.Q(-7, 18, -9, 22, -7, 28);   // 左腰褶
      bi.Q(7, 18, 9, 22, 7, 28);      // 右腰褶

      // 膝部（坐姿）
      bi.A(-8, 35, 3);                 // 左膝
      bi.A(8, 35, 3);                  // 右膝

      // 腿部褶紋
      bi.thin(() => {
        bi.Q(-8, 32, -10, 38, -8, 44); // 左脛褶
        bi.Q(8, 32, 10, 38, 8, 44);    // 右脛褶
      });

      // 盤腿（足）
      bi.Q(-12, 45, -14, 48, -10, 52); // 左足
      bi.Q(12, 45, 14, 48, 10, 52);    // 右足

      // 簡筆開臉
      bi.thin(() => {
        bi.P([[0, -2.5], [0, -1.5]], false);  // 鼻樑
        bi.A(-1.5, -3, 1);                    // 左眼
        bi.A(1.5, -3, 1);                     // 右眼
        bi.dot(-1.5, -3, 0.3);                // 左瞳
        bi.dot(1.5, -3, 0.3);                 // 右瞳
        bi.P([[0, -0.5], [0, 1]], false);     // 人中
        bi.Q(-1, 1.5, 0, 2, 1, 1.5);         // 口線
      });
    }

    // ════════════════════════════════════════════════════════════════════════════════
    // 題三：金剛薩埵
    // ════════════════════════════════════════════════════════════════════════════════
    function 畫金剛薩埵(canvasId) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const R = canvas.width / 2 - 20;
      const bi = new 筆具(ctx, R);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.translate(canvas.width / 2, canvas.height / 2);

      bi.setWidth(bi.W_OUT);

      // 月輪（淡出）
      bi.dim(0.2, () => {
        bi.A(0, 0, R * 0.45);
      });

      // 蓮座
      const 瓣數 = 8;
      for (let i = 0; i < 瓣數; i++) {
        const 角 = (i / 瓣數) * Math.PI * 2 - Math.PI / 2;
        const x0 = Math.cos(角) * 28;
        const z0 = 28 + Math.sin(角) * 8;
        bi.Q(x0 - 2, z0, x0, z0 + 3, x0 + 2, z0);
      }
      bi.A(0, 28, 26);

      // 身軀：菩薩形
      bi.A(0, -2, 4.5);  // 臉

      // 五佛冠（更複雜）
      bi.thin(() => {
        bi.A(0, -6, 6);          // 冠邊
        bi.P([[-4, -8], [0, -11], [4, -8]], false);   // 中峰
        bi.P([[-6, -7], [-4, -9]], false);            // 左前峰
        bi.P([[6, -7], [4, -9]], false);              // 右前峰
        bi.P([[-4, -6.5], [-2, -8]], false);          // 左側峰
        bi.P([[4, -6.5], [2, -8]], false);            // 右側峰
      });

      // 頸肩
      bi.Q(0, -2, -1, 1, -6, 5);
      bi.Q(0, -2, 1, 1, 6, 5);

      // 右臂斜執五鈷杵當胸
      bi.Q(6, 5, 10, 12, 12, 20);     // 右上臂
      bi.Q(12, 20, 14, 22, 12, 25);   // 右肘彎

      // 五鈷杵（簡化）
      bi.thin(() => {
        bi.P([[12, 23], [12, 16]]);        // 杵柄
        bi.P([[10, 16], [12, 14], [14, 16]]);  // 上三鈷
        bi.P([[11, 16], [12, 15]]);        // 中鈷
        bi.P([[10.5, 17], [11.5, 18]]);    // 下左鈷
        bi.P([[13.5, 17], [12.5, 18]]);    // 下右鈷
      });

      // 左臂執五鈷鈴安左股
      bi.Q(-6, 5, -10, 14, -10, 28);   // 左臂下垂

      // 五鈷鈴（簡化）
      bi.thin(() => {
        bi.A(-10, 30, 1.5);             // 鈴身
        bi.P([[-10, 28.5], [-10, 26]]); // 柄
        bi.P([[-11, 26], [-10, 24], [-9, 26]]);  // 鈴鈷
      });

      // 身體主線
      bi.thin(() => {
        bi.P([[0, 5], [0, 28]], false);  // 中線
      });

      bi.Q(-6, 5, -8, 12, -7, 20);    // 左臂線
      bi.Q(6, 5, 8, 12, 8, 20);       // 右臂線

      // 腰腹褶紋
      bi.thin(() => {
        bi.Q(-7, 18, -9, 24, -7, 30);
        bi.Q(7, 18, 9, 24, 7, 30);
      });

      // 膝與盤腿
      bi.A(-8, 35, 3);
      bi.A(8, 35, 3);

      bi.Q(-12, 44, -14, 48, -10, 52);
      bi.Q(12, 44, 14, 48, 10, 52);

      // 簡筆開臉（金剛薩埵特徵：莊嚴相）
      bi.thin(() => {
        bi.P([[0, -2.5], [0, -1.5]], false);  // 鼻樑
        bi.A(-1.5, -3, 1);
        bi.A(1.5, -3, 1);
        bi.dot(-1.5, -3, 0.4);
        bi.dot(1.5, -3, 0.4);
        bi.P([[0, -0.5], [0, 1]], false);
        bi.Q(-1.5, 1.5, 0, 2.5, 1.5, 1.5);   // 嚴肅之口
      });
    }

    // ════════════════════════════════════════════════════════════════════════════════
    // 題四：五鈷杵三昧耶形
    // ════════════════════════════════════════════════════════════════════════════════
    function 畫五鈷杵(canvasId) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const R = canvas.width / 2 - 20;
      const bi = new 筆具(ctx, R);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.translate(canvas.width / 2, canvas.height / 2);

      bi.setWidth(bi.W_OUT);

      // 月輪（淡淡背景）
      bi.dim(0.15, () => {
        bi.A(0, 2, R * 0.45);
      });

      // 蓮座（三昧耶器之承座）
      const 瓣數 = 8;
      for (let i = 0; i < 瓣數; i++) {
        const 角 = (i / 瓣數) * Math.PI * 2 - Math.PI / 2;
        const x0 = Math.cos(角) * 20;
        const z0 = 18 + Math.sin(角) * 6;
        bi.Q(x0 - 1.5, z0, x0, z0 + 2, x0 + 1.5, z0);
      }
      bi.A(0, 18, 18);  // 座邊

      // 五鈷杵主體（豎立，中央）
      // 把：握部（鬼目與蓮弁帯）
      bi.Q(-1.5, -5, -2, 0, -1.5, 5);    // 把左側
      bi.Q(1.5, -5, 2, 0, 1.5, 5);       // 把右側

      // 鬼目：二重圈楕圓飾（把與杵柄交界）
      bi.thin(() => {
        bi.E(0, 4, 1.8, 1.2);             // 外圈
        bi.E(0, 4, 1, 0.7);               // 內圈
      });

      // 蓮弁帯：八葉間弁（把下、鈷上）
      bi.thin(() => {
        for (let i = 0; i < 8; i++) {
          const 角 = (i / 8) * Math.PI * 2;
          const x1 = Math.cos(角) * 1.8;
          const z1 = 5 + Math.sin(角) * 0.8;
          const x2 = Math.cos(角) * 1.5;
          const z2 = 7;
          bi.P([[x1, z1], [x2, z2]], false);
        }
      });

      // 中鈷：直身八角稜線（主鈷，直而稍長）
      bi.B(-0.8, 6, -1, 10, -0.8, 15, 0, 20);   // 中鈷左稜
      bi.B(0.8, 6, 1, 10, 0.8, 15, 0, 20);      // 中鈷右稜
      bi.thin(() => {
        bi.P([[0, 6], [0, 20]], false);         // 中棱（八角示意）
      });

      // 脇鈷：四鈷，嘴形內彎（抱向中鈷）
      // 上左鈷
      bi.B(-0.5, 8, -2.5, 10, -3, 12, -2, 14);
      bi.B(-2, 14, -2.5, 16, -2, 17.5, 0, 20);

      // 上右鈷
      bi.B(0.5, 8, 2.5, 10, 3, 12, 2, 14);
      bi.B(2, 14, 2.5, 16, 2, 17.5, 0, 20);

      // 下左鈷
      bi.B(-0.5, 12, -2.8, 13, -3.2, 15, -2.5, 17);
      bi.B(-2.5, 17, -2.8, 18.5, -2, 19.5, 0, 20);

      // 下右鈷
      bi.B(0.5, 12, 2.8, 13, 3.2, 15, 2.5, 17);
      bi.B(2.5, 17, 2.8, 18.5, 2, 19.5, 0, 20);

      // 鈷尖（示意鈷的銳角）
      bi.thin(() => {
        bi.dot(0, 20, 0.3);      // 中鈷尖端
      });

      // 杵柄下段（把之下）
      bi.Q(-1, 5, -1.2, 8, -0.8, 12);
      bi.Q(1, 5, 1.2, 8, 0.8, 12);

      // 杵底（柄末端，方形或圓形）
      bi.A(0, 14, 0.7);  // 簡化為圓

      console.log('✓ 四題競本已落筆——格網錨點自證無誤');
    }

    // 繪製所有四幅
    window.addEventListener('load', () => {
      畫智拳印('canvas1');
      畫大日如來('canvas2');
      畫金剛薩埵('canvas2b');
      畫五鈷杵('canvas3');
    });
  </script>
