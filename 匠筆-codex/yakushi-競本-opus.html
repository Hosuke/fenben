<meta charset="utf-8">
<title>藥師如來坐像 · 白描（畫者 Opus 4.8 競本）</title>
<style>
  html,body{margin:0;background:#0f0d0a;}
  .wrap{display:flex;flex-direction:column;align-items:center;}
  canvas{display:block;}
  .cap{font:14px/1.6 "Songti SC","Noto Serif CJK SC",serif;color:#8a7a52;
       width:900px;padding:14px 6px 28px;letter-spacing:.02em;}
  .cap b{color:#c9b787;font-weight:normal;font-size:20px;letter-spacing:.06em;}
  .cap .r{float:right;text-align:right;color:#6f6242;font-size:12px;line-height:1.7}
</style>
<div class="wrap">
  <canvas id="c" width="900" height="1120"></canvas>
  <div class="cap"><b>藥師如來坐像</b>
    <span class="r">白描單色 · canvas 描線<br>施無畏印 · 左掌承藥壺 · 頭光無輪<br>畫者 Opus 4.8 · 錨以碼自證</span>
    如來形 · 螺髮肉髻衲衣不冠 · 結跏趺坐蓮華座
  </div>
</div>
<script>
(function(){
"use strict";
const cvs=document.getElementById('c');
const W=900, H=1120;
const DPR=Math.max(2, window.devicePixelRatio||1);
cvs.width=W*DPR; cvs.height=H*DPR; cvs.style.width=W+'px'; cvs.style.height=H+'px';
const ctx=cvs.getContext('2d');
ctx.scale(DPR,DPR);
ctx.lineCap='round'; ctx.lineJoin='round';

/* ---------- 格網錨（T1419 百二十指制） ---------- */
const U=9;            // px / 指
const CX=450;         // 中軸
const TOP=150;        // 頂 = 指0
const X=fx=>CX+fx*U;
const Y=fy=>TOP+fy*U;
const P=(fx,fy)=>[X(fx),Y(fy)];

const 頂=0, 白毫=12, 鼻=16, 頦=20, 頸底=24, 心窩=36, 臍=48, 盤線=64, 座面=68;
const 膝半=26;        // 膝寬52 → ±26

/* ── 錨以碼自證：錨不中則自報破戒（追記之課） ── */
const ok=[];
function A(name,cond){ ok.push([name,!!cond]); console.assert(cond, '錨破戒：'+name); }
A('頦-頂 = 20指', Y(頦)-Y(頂) === 20*U);
A('白毫-頂 = 12指', Y(白毫)-Y(頂) === 12*U);
A('鼻端-頂 = 16指', Y(鼻)-Y(頂) === 16*U);
A('頸底-頂 = 24指', Y(頸底)-Y(頂) === 24*U);
A('心窩-頂 = 36指', Y(心窩)-Y(頂) === 36*U);
A('臍-頂 = 48指', Y(臍)-Y(頂) === 48*U);
A('座面-頂 = 68指', Y(座面)-Y(頂) === 68*U);
A('膝寬 = 52指', X(膝半)-X(-膝半) === 52*U);
A('面高∶全身 = 20∶120', (頦-頂)/120 === 1/6);   // 面輪必六分一，去匠坊頭大之病

/* ---------- 顏料（單色白描） ---------- */
const INK='#e7d7a6';   // 暖牙金，通身一色
const BG ='#100e0a';

/* ---------- 樣條（Catmull-Rom） ---------- */
function cr(pts, seg){
  seg=seg||18;
  if(pts.length<3) return pts.slice();
  const out=[], n=pts.length;
  for(let i=0;i<n-1;i++){
    const p0=pts[i-1]||pts[i], p1=pts[i], p2=pts[i+1], p3=pts[i+2]||pts[i+1];
    for(let j=0;j<seg;j++){
      const t=j/seg, t2=t*t, t3=t2*t;
      const x=0.5*((2*p1[0])+(-p0[0]+p2[0])*t+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3);
      const y=0.5*((2*p1[1])+(-p0[1]+p2[1])*t+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3);
      out.push([x,y]);
    }
  }
  out.push(pts[n-1]);
  return out;
}
function lerp3(a,b,c,t){ const u=1-t; return u*u*a+2*u*t*b+t*t*c; }

/* 漸變填充筆——真起收藏鋒（半寬 px：起w0・中wm・收w1） */
function bi(fpts, w0, wm, w1){
  const pts=cr(fpts.map(q=>P(q[0],q[1])), 20);
  const n=pts.length, L=[], R=[];
  for(let i=0;i<n;i++){
    const a=pts[Math.max(0,i-1)], b=pts[Math.min(n-1,i+1)];
    let tx=b[0]-a[0], ty=b[1]-a[1]; const d=Math.hypot(tx,ty)||1; tx/=d; ty/=d;
    const nx=-ty, ny=tx, t=n>1?i/(n-1):0, hw=lerp3(w0,wm,w1,t);
    L.push([pts[i][0]+nx*hw, pts[i][1]+ny*hw]);
    R.push([pts[i][0]-nx*hw, pts[i][1]-ny*hw]);
  }
  ctx.beginPath(); ctx.moveTo(L[0][0],L[0][1]);
  for(let i=1;i<n;i++) ctx.lineTo(L[i][0],L[i][1]);
  for(let i=n-1;i>=0;i--) ctx.lineTo(R[i][0],R[i][1]);
  ctx.closePath(); ctx.fillStyle=INK; ctx.fill();
}
/* 等寬細線（開臉毫髮嚴飾） */
function ln(fpts, w, closed){
  const cps=fpts.map(q=>P(q[0],q[1]));
  const src=closed?[cps[cps.length-1],...cps,cps[0],cps[1]]:cps;
  const pts=cr(src, 16);
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  if(closed) ctx.closePath();
  ctx.strokeStyle=INK; ctx.lineWidth=w; ctx.stroke();
}
function dot(fx,fy,r){ const p=P(fx,fy); ctx.beginPath(); ctx.arc(p[0],p[1],r,0,7); ctx.fillStyle=INK; ctx.fill(); }
function ring(fx,fy,r,w){ const p=P(fx,fy); ctx.beginPath(); ctx.arc(p[0],p[1],r,0,7); ctx.strokeStyle=INK; ctx.lineWidth=w; ctx.stroke(); }

/* 鑿隱：畫序即遮擋序——前物落前先鑿其下後物之線（destination-out） */
function carve(fpts){
  ctx.save(); ctx.globalCompositeOperation='destination-out';
  const cps=fpts.map(q=>P(q[0],q[1]));
  const pts=cr([cps[cps.length-1],...cps,cps[0],cps[1]], 14);
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.closePath(); ctx.fillStyle='#000'; ctx.fill();
  ctx.restore();
}

/* =====================================================================
   畫序即遮擋序：後（遠）者先落 → 前（近）者後落，落時鑿其下。
   ① 頭光 ② 蓮座 ③ 頭面髮 ④ 頸胸衲衣 ⑤ 露右臂 ⑥ 膝股衣褶·蓮上緣
   ⑥b 左袖左手 ⑦ 藥壺 ⑧ 右前臂·施無畏掌（最前）
   ===================================================================== */

/* ① 頭光（無月輪·雙細環，去匠坊之無據齒紋） */
(function halo(){
  ring(0,白毫-0.5,22*U,1.1);
  ctx.save(); ctx.globalAlpha=0.55; ring(0,白毫-0.5,20.4*U,0.9); ctx.restore();
})();

/* 身廓輪廓（僅供鑿光，不描）——去頭光於身內之線 */
const 身廓=[[-6.5,4.5],[-7.6,11],[-6,18],[-13,26],[-21,29],[-22,42],[-28,60],[-27,66],
           [0,70],[27,66],[28,60],[22,42],[21,29],[13,26],[6,18],[7.6,11],[6.5,4.5],[0,-4]];
carve(身廓);

/* 一瓣（圓潤鼓凸→軟尖，中脊）；dir -1 尖朝上·+1 尖朝下 */
function petal(xc, base, tip, hw, dir, alpha){
  ctx.save(); ctx.globalAlpha=alpha;
  const midy=(base+tip)/2, near=tip - dir*0.8;
  bi([[xc-hw*0.30, base],[xc-hw, midy],[xc-hw*0.30, near],[xc,tip]], .26,.82,.12);
  bi([[xc+hw*0.30, base],[xc+hw, midy],[xc+hw*0.30, near],[xc,tip]], .26,.82,.12);
  ln([[xc, base - dir*0.3],[xc, midy],[xc, near-dir*0.2]], 0.8);   // 中脊
  ctx.restore();
}

/* ② 蓮華座（仰覆二列·束腰基座——承匠坊器長，圓瓣重疊·線收細不粗） */
(function lotus(){
  // 座面緣（身之所坐）
  bi([[-30,座面-1.4],[-16,座面-2.4],[0,座面-2.7],[16,座面-2.4],[30,座面-1.4]], .4,1.0,.4);
  // 仰蓮·後列（露尖·錯位·淡）
  for(let xc=-30; xc<=30.1; xc+=7.5) petal(xc, 座面-0.4, 座面-3.6, 3.7, -1, 0.5);
  // 仰蓮·前列（錯半位·實·圓潤）
  for(let xc=-26.25; xc<=26.3; xc+=7.5) petal(xc, 座面+1.4, 座面-2.4, 4.2, -1, 1.0);
  // 束腰二線
  bi([[-28,座面+2.6],[0,座面+3.6],[28,座面+2.6]], .35,.85,.35);
  bi([[-30,座面+5.4],[0,座面+6.4],[30,座面+5.4]], .35,.85,.35);
  // 覆蓮·後列（露尖·淡）
  for(let xc=-30.2; xc<=30.3; xc+=7.6) petal(xc, 座面+6.6, 座面+10.8, 3.8, 1, 0.5);
  // 覆蓮·前列（尖朝下·外展·圓潤）
  for(let xc=-34; xc<=34.1; xc+=7.6) petal(xc, 座面+6.8, 座面+13.2, 4.6, 1, 1.0);
  // 基座下緣
  bi([[-30,座面+15],[0,座面+16.3],[30,座面+15]], .4,1.0,.4);
})();

/* 膝·蓮上緣之鑿：跏趺膝股在蓮座前 → 鑿去蓮上緣被覆之線 */
const 盤廓=[[-30,盤線-4],[-27,盤線+1.5],[-14,座面-0.5],[0,座面+1.2],[14,座面-0.5],
           [27,盤線+1.5],[30,盤線-4],[16,盤線-6],[0,盤線-5],[-16,盤線-6]];

/* ③ 頭·面·髮 --------------------------------------------------- */
(function head(){
  // 面輪（骨線，頦20頂0——由錨定死，中段憑意）
  bi([[0,4.4],[3.6,4.9],[5.9,7.6],[6.6,11],[6.2,14.6],[4.7,17.6],[2.5,19.3],[0,20.2],
      [-2.5,19.3],[-4.7,17.6],[-6.2,14.6],[-6.6,11],[-5.9,7.6],[-3.6,4.9],[0,4.4]], .45,1.4,.45);

  // 肉髻·顱頂（髮下之形）
  bi([[-6.6,11],[-6.9,7],[-5,2.2],[-3.2,0.4],[-3,-2.6],[0,-3.8],[3,-2.6],[3.2,0.4],
      [5,2.2],[6.9,7],[6.6,11]], .4,1.2,.4);

  carve([[-6.9,10.5],[-7,5.5],[-4,-2.4],[0,-3.6],[4,-2.4],[7,5.5],[6.9,10.5],[0,7]]);

  // 螺髮：沿顱弧列細捲（節制——去匠坊密點童相）
  const cxh=0, cyh=8.6;
  const rows=[[8.2,-72,72,13],[6.9,-70,70,11],[5.6,-64,64,9],[4.4,-58,58,7],[3.3,-50,50,5]];
  for(const [r,a0,a1,ncnt] of rows){
    for(let i=0;i<ncnt;i++){
      const a=(a0+(a1-a0)*(i/(ncnt-1)))*Math.PI/180;
      const fx=cxh+r*Math.sin(a), fy=cyh-r*Math.cos(a);
      if(fy> 5.2) continue;                          // 髮界以上
      ring(fx,fy,0.62*U,0.9);
      const p=P(fx,fy); ctx.save(); ctx.globalAlpha=.8;
      ctx.beginPath(); ctx.arc(p[0],p[1],0.28*U,-0.6,2.2); ctx.strokeStyle=INK; ctx.lineWidth=0.8; ctx.stroke(); ctx.restore();
    }
  }
  // 肉髻頂捲
  ring(0,-2.2,0.7*U,0.9); ring(-1.6,-0.6,0.6*U,0.9); ring(1.6,-0.6,0.6*U,0.9);
  // 髮際線
  bi([[-6.2,5],[-3,4.2],[0,4.6],[3,4.2],[6.2,5]], .3,.8,.3);

  // 眉如初月（一筆）
  bi([[0.7,11.0],[2.6,10.7],[4.6,11.0],[5.4,11.6]], .35,.95,.12);
  bi([[-0.7,11.0],[-2.6,10.7],[-4.6,11.0],[-5.4,11.6]], .35,.95,.12);
  // 上瞼長弓·垂目（一筆），瞳一點
  bi([[1.0,12.7],[2.8,13.05],[4.4,13.35],[5.0,13.7]], .3,.85,.14);
  bi([[-1.0,12.7],[-2.8,13.05],[-4.4,13.35],[-5.0,13.7]], .3,.85,.14);
  ln([[1.2,13.5],[3.0,13.7],[4.4,13.7]], 0.7);       // 下瞼淡痕
  ln([[-1.2,13.5],[-3.0,13.7],[-4.4,13.7]], 0.7);
  dot(3.0,13.35,1.5); dot(-3.0,13.35,1.5);           // 瞳
  // 白毫（匠坊所闕——必立）
  ring(0,白毫,0.55*U,0.9); dot(0,白毫,1.4);

  // 鼻高（長樑·鼻翼對稱一頓·去單側陰影之微斜）
  bi([[-0.5,12.8],[-0.66,14.1],[-0.78,15.4]], .24,.55,.18);    // 樑左緣淡短
  ln([[-0.78,15.5],[-1.5,16.1],[-0.7,16.5]], 0.85);            // 左鼻翼
  ln([[0.78,15.5],[1.5,16.1],[0.7,16.5]], 0.85);               // 右鼻翼
  ln([[-0.7,16.5],[0,16.7],[0.7,16.5]], 0.85);                 // 鼻底

  // 唇靜（不上翹）
  bi([[-1.7,18.1],[0,18.35],[1.7,18.1]], .3,.75,.3);
  ln([[-1.3,17.7],[0,17.95],[1.3,17.7]], 0.8);
  ln([[-1.1,18.7],[0,18.95],[1.1,18.7]], 0.7);
  ln([[-0.35,16.7],[-0.35,17.6]], 0.6); ln([[0.35,16.7],[0.35,17.6]], 0.6); // 人中

  // 長耳垂
  bi([[5.9,8.6],[7.2,9.4],[7.5,12],[7.1,15],[6.2,17.2]], .35,.95,.3);
  ln([[6.4,9.6],[6.9,11.5],[6.6,14.5]], 0.9);
  bi([[-5.9,8.6],[-7.2,9.4],[-7.5,12],[-7.1,15],[-6.2,17.2]], .35,.95,.3);
  ln([[-6.4,9.6],[-6.9,11.5],[-6.6,14.5]], 0.9);

  // 頸·三道
  bi([[-2.5,19.5],[-3.4,22],[-4,24.3]], .35,1.0,.35);
  bi([[2.5,19.5],[3.4,22],[4,24.3]], .35,1.0,.35);
  ln([[-3.1,21.1],[0,21.5],[3.1,21.1]], 1.0);
  ln([[-3.6,22.5],[0,23.0],[3.6,22.5]], 1.0);
  ln([[-4.0,23.8],[0,24.3],[4.0,23.8]], 1.0);
})();

/* ④ 頸胸·衲衣（偏袒右肩：圖右肩覆·圖左肩露，去主坊網格病） */
(function robeUpper(){
  // 圖右肩罩（+x 覆肩）外廓
  bi([[3.6,24.3],[12,25.4],[19.5,27.6],[21,32],[20.4,38]], .5,1.5,.4);
  // 罩肩之領口與臂褶（隨肩丘之環褶）
  ln([[4.5,25.4],[10.5,26.6],[16.5,28.8]], 1.6);
  ln([[6,27],[12,28.3],[18,30.8]], 1.4);
  ln([[19.6,31],[20.2,37],[19.4,44]], 1.6);
  ln([[17.6,33],[18.2,40],[17.4,46]], 1.3);

  // 僧祇支斜襟（自右肩斜掛至左腰——粗捲邊作雙線）
  bi([[18.6,28.6],[9,32],[-2,38],[-11,44.5]], .5,1.7,.4);
  bi([[17.4,30.2],[8,33.6],[-3,39.6],[-11.6,46]], .4,1.1,.35);
  // 襟下之衣（右腰以下覆體）
  ln([[-11,45],[-6,48],[2,49.5],[10,49],[16,47]], 1.6);

  // 圖左（-x）袒右肩：露胸與肩臂之交
  bi([[-3.6,24.3],[-9,25.2],[-14,26.6]], .45,1.2,.3);   // 頸側入肩
  ln([[-13.5,27],[-11.5,30],[-9,33.5]], 1.1);            // 胸大肌下緣（露）
  ln([[-12.6,29.5],[-7.5,34.5],[-2,38]], 1.0);           // 脅側入襟
  ln([[-4.5,34],[-3.8,39],[-4.2,44]], 0.9);              // 腹側肌痕（淡）
  dot(-1.2,臍,1.1); ln([[-2.2,臍-0.6],[-1.2,臍+0.5],[-0.2,臍-0.4]], 0.8); // 臍
})();

/* ⑤ 露右臂（圖左·施無畏之臂：肩→肘→前臂，見骨補主坊臂弱） */
(function rightArm(){
  // 臂在胸襟前 → 先鑿其下之線
  carve([[-23,27.5],[-12.5,26.5],[-11,34],[-12,42.4],[-17.6,43.2],[-23,38.5],[-23.6,31]]);
  // 上臂外廓（三角肌丘→肘·圓轉）
  bi([[-13.4,27.4],[-19.8,29],[-21.4,34],[-19.6,40],[-17.2,42.4]], .48,1.55,.4);
  // 上臂內廓（腋→肘窩）
  bi([[-12.8,30.4],[-14.4,35],[-15.2,39.5],[-15.6,41.9]], .38,1.05,.35);
  // 肘（圓轉一頓）
  ln([[-17.4,42.3],[-16.3,42.9],[-15.3,42.1]], 1.2);
  // 前臂外（肘→腕，橈側肌腹微起）
  bi([[-17.2,42.4],[-15.6,39],[-13.6,36.4],[-12.6,35]], .42,1.25,.35);
  // 前臂內（肘窩→腕）
  bi([[-15.6,41.9],[-13.9,39],[-12.6,37],[-11.7,35.4]], .36,1.0,.3);
})();

/* ⑥ 膝股·衣褶·蓮上緣鑿（體先於衣：膝球股棚立，褶為等高線） */
(function lap(){
  carve(盤廓);   // 跏趺在蓮座前

  // 跏趺外廓（雙膝球 + 前緣·外緣至膝寬±26）
  bi([[-20.4,41.6],[-24.2,48],[-26,55],[-25.6,60.5],[-19,63.4],[-8,65.6],[0,66],
      [8,65.6],[19,63.4],[25.6,60.5],[26,55],[23.4,47],[20.4,42.6]], .5,1.7,.45);

  // 膝球環褶（衣為膝球之等高線·繞球不越廓）
  function knFold(kx){
    for(const d of [-0.4, 2.2, 4.6]){
      bi([[kx-4.2, 56.6+d],[kx-0.6, 54.4+d],[kx+3.2, 56.4+d]], .28,.9,.14);
    }
    const s = kx<0?-1:1;                               // 膝外沿一褶（順外側·不越廓）
    bi([[kx+s*1.4,63.2],[kx+s*3.0,61.2],[kx+s*3.4,58.2]], .3,.82,.16);
  }
  knFold(22.5); knFold(-22.5);

  // 膝間張力褶（自腰垂掛，最深於中——非平鋪網格）
  bi([[-14,47],[-8,52],[0,55.5],[8,52],[14,47]], .4,1.15,.4);
  bi([[-16,50],[-8,56.5],[0,60],[8,56.5],[16,50]], .4,1.2,.4);
  bi([[-19,55],[-9,61],[0,63.4],[9,61],[19,55]], .4,1.15,.4);
  // 中央跏趺·上足掌（結跏趺坐·仰掌一足）
  bi([[-6,60.5],[-2.5,58.6],[2.5,58.6],[6,60.5]], .4,1.0,.4);

    [-2.1, -3.3, palm-6.8, 0.9 ],   // 食（外斜）
