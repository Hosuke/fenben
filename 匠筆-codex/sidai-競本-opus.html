<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>四題競本 · opus 卷</title>
<style>
  :root{ --紺:#0e1322; --金:#d8b76a; --灰:#8b97b4; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:var(--紺); color:var(--灰); font:13px/1.7 "Hiragino Mincho ProN","Songti TC",serif; padding:28px 20px 60px; }
  header{ max-width:1280px; margin:0 auto 22px; }
  header h1{ color:var(--金); font-size:19px; font-weight:600; letter-spacing:.18em; }
  header p{ font-size:12px; opacity:.75; margin-top:4px; letter-spacing:.06em; }
  .卷{ display:flex; flex-wrap:wrap; gap:26px; justify-content:center; max-width:1280px; margin:0 auto; }
  figure{ width:300px; flex:1 1 280px; max-width:330px; }
  canvas{ width:100%; height:auto; display:block; background:var(--紺);
          border:1px solid rgba(216,183,106,.18); border-radius:4px; }
  figcaption{ margin-top:9px; font-size:12px; letter-spacing:.05em; }
  figcaption b{ color:var(--金); font-weight:600; display:block; font-size:13px; margin-bottom:2px; }
  figcaption .驗{ display:block; margin-top:3px; font-size:11px; opacity:.8; }
  figcaption .驗.過{ color:#8fbf8f; } figcaption .驗.破{ color:#cf7060; }
</style>
</head>
<body>
<header>
  <h1>四題競本 · opus 卷</h1>
  <p>白描單色無填｜線身比一比百至二百｜畫序即遮擋序（destination-out 鑿）｜格網錨以碼自證</p>
</header>
<div class="卷">
  <figure><canvas id="c1" width="1120" height="1520"></canvas>
    <figcaption><b>一 · 智拳印獨幅</b>左拳立頭指，右拳握之；右拇端拄左頭指端。逐指逐節，蔽法斷隱。<span class="驗" id="v1"></span></figcaption></figure>
  <figure><canvas id="c2" width="1120" height="1520"></canvas>
    <figcaption><b>二 · 大日如來（金剛界）</b>菩薩形，五智寶冠，智拳印當心，結跏趺坐月輪蓮座。<span class="驗" id="v2"></span></figcaption></figure>
  <figure><canvas id="c3" width="1120" height="1520"></canvas>
    <figcaption><b>三 · 金剛薩埵</b>五佛冠；右手斜執五鈷杵當胸，左手執五鈷鈴安左股。<span class="驗" id="v3"></span></figcaption></figure>
  <figure><canvas id="c4" width="1120" height="1520"></canvas>
    <figcaption><b>四 · 五鈷杵三昧耶形</b>把・鬼目・蓮弁帯・中鈷直・脇鈷嘴形內彎；豎立蓮座上，兩端對稱。<span class="驗" id="v4"></span></figcaption></figure>
</div>
<script>
'use strict';
/* ———— 筆具 ———— */
const 金 = '#d8b76a';
const 淡金 = 'rgba(216,183,106,.46)';
const 微金 = 'rgba(216,183,106,.30)';
const 灰藍 = 'rgba(150,165,200,.26)';
const 灰字 = 'rgba(150,165,200,.55)';

function 卷面(id){
  const c = document.getElementById(id);
  const x = c.getContext('2d');
  x.setTransform(2,0,0,2,0,0);          // 1120×1520 實素 → 560×760 畫座標
  x.lineCap = 'round'; x.lineJoin = 'round';
  return x;
}

/* Catmull-Rom 取樣：控點稀而曲線潤 */
function 採(pts, 閉=false){
  const n = pts.length;
  if (n < 2) return pts.map(p=>({x:p[0],y:p[1]}));
  const G = i => { const j = 閉 ? ((i%n)+n)%n : Math.max(0, Math.min(n-1, i));
                   return {x:pts[j][0], y:pts[j][1]}; };
  const out = [];
  const 段 = 閉 ? n : n-1;
  for (let i=0;i<段;i++){
    const p0=G(i-1), p1=G(i), p2=G(i+1), p3=G(i+2);
    const L = Math.hypot(p2.x-p1.x, p2.y-p1.y);
    const m = Math.max(3, Math.min(28, Math.round(L/4)));
    for (let j=0;j<m;j++){
      const t=j/m, t2=t*t, t3=t2*t;
      out.push({
        x: .5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
        y: .5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
      });
    }
  }
  out.push(閉 ? {...out[0]} : G(n-1));
  return out;
}

/* 線：帶鋒之筆——藏鋒起、出鋒收，一線之內有寬窄之息 */
function 線(x, pts, w, opt={}){
  const S = 採(pts, false);
  if (S.length < 2) return;
  const 入 = opt.入 ?? .55;      // 起筆藏鋒之鈍（1=平頭）
  const 出 = opt.出 ?? .10;      // 收筆出鋒之銳（0=針尖）
  const 起段 = opt.起段 ?? .16, 收段 = opt.收段 ?? .22;
  const w0 = Array.isArray(w) ? w[0] : w, w1 = Array.isArray(w) ? w[1] : w;
  const N = S.length, L=[], R=[];
  for (let i=0;i<N;i++){
    const a = S[Math.max(0,i-1)], b = S[Math.min(N-1,i+1)];
    let dx=b.x-a.x, dy=b.y-a.y; const d=Math.hypot(dx,dy)||1; dx/=d; dy/=d;
    const t = i/(N-1);
    let 勢 = 1;
    if (t < 起段) { const k=t/起段; 勢 = 入 + (1-入)*(k*k*(3-2*k)); }
    if (t > 1-收段){ const k=(1-t)/收段; const e = 出 + (1-出)*(k*k*(3-2*k)); 勢 = Math.min(勢, e); }
    const h = Math.max(.06, (w0+(w1-w0)*t) * 勢) / 2;
    L.push({x:S[i].x - dy*h, y:S[i].y + dx*h});
    R.push({x:S[i].x + dy*h, y:S[i].y - dx*h});
  }
  x.beginPath();
  x.moveTo(L[0].x, L[0].y);
  for (let i=1;i<N;i++) x.lineTo(L[i].x, L[i].y);
  for (let i=N-1;i>=0;i--) x.lineTo(R[i].x, R[i].y);
  x.closePath();
  x.fillStyle = opt.色 || 金;
  x.fill();
}

/* 勒：等寬勾勒（小環細節與閉郭之緣） */
function 勒(x, pts, w, opt={}){
  const S = 採(pts, !!opt.閉);
  x.beginPath();
  x.moveTo(S[0].x,S[0].y);
  for (let i=1;i<S.length;i++) x.lineTo(S[i].x,S[i].y);
  if (opt.閉) x.closePath();
  x.strokeStyle = opt.色 || 金; x.lineWidth = w; x.stroke();
}

/* 鑿：前者落筆時鑿去其身下先落之線（遮擋自治之本） */
function 鑿(x, pts){
  const S = 採(pts, true);
  x.save(); x.globalCompositeOperation = 'destination-out';
  x.beginPath(); x.moveTo(S[0].x,S[0].y);
  for (let i=1;i<S.length;i++) x.lineTo(S[i].x,S[i].y);
  x.closePath(); x.fillStyle='#000'; x.fill(); x.restore();
}

/* 鑿線：沿線清底——交線處留斷筆之隙 */
function 鑿線(x, pts, w){
  const S = 採(pts, false);
  x.save(); x.globalCompositeOperation = 'destination-out';
  x.beginPath(); x.moveTo(S[0].x,S[0].y);
  for (let i=1;i<S.length;i++) x.lineTo(S[i].x,S[i].y);
  x.strokeStyle='#000'; x.lineWidth=w; x.lineCap='round'; x.lineJoin='round';
  x.stroke(); x.restore();
}

function 點(x, cx, cy, r, 色=金){ x.beginPath(); x.arc(cx,cy,r,0,7); x.fillStyle=色; x.fill(); }
function 環(x, cx, cy, r, w, 色=金){ x.beginPath(); x.arc(cx,cy,r,0,7); x.strokeStyle=色; x.lineWidth=w; x.stroke(); }
function 鑿圓(x, cx, cy, r){ x.save(); x.globalCompositeOperation='destination-out';
  x.beginPath(); x.arc(cx,cy,r,0,7); x.fill(); x.restore(); }
function 文(x, s, px, py, 大=11){ x.fillStyle=灰字; x.font=大+'px "Hiragino Mincho ProN",serif'; x.fillText(s,px,py); }

/* 自證之錄 */
const 驗錄 = { c1:[], c2:[], c3:[], c4:[] };
function 證(卷, 名, 真){ 驗錄[卷].push({名, 真}); console.assert(真, 卷+' 破戒：'+名); }
function 報(卷){
  const el = document.getElementById('v'+卷.slice(1));
  const 破 = 驗錄[卷].filter(r=>!r.真);
  el.textContent = 破.length ? '錨自證：破 '+破.map(r=>r.名).join('、')
                             : '錨自證 '+驗錄[卷].length+' 條皆過';
  el.className = '驗 ' + (破.length ? '破' : '過');
}
/* ———— 坐尊共基（②大日 ③薩埵 共用；臂與持物各自運） ———— */
function 坐尊(id, 臂fn, 冠式){
  const x = 卷面(id);
  const u = 7, cx = 280, 頂 = 62;
  const Y = k => 頂 + k*u;
  const 位 = a => a.map(([vx,vy]) => [cx+vx*u, Y(vy)]);
  const 鏡 = a => a.map(([vx,vy]) => [-vx, vy]);
  const H = { x, u, cx, 頂, Y, 位, 鏡, id };

  /* 一 · 格網（律之底） */
  const 格 = [['白毫',12],['頦',20],['心窩',36],['臍',48],['盤線',64],['座面',68]];
  for (const [名,k] of 格){
    勒(x, [[18,Y(k)],[542,Y(k)]], .7, {色:灰藍});
    文(x, 名+' '+k, 20, Y(k)-4, 10);
  }
  勒(x, [[cx,Y(-6)],[cx,Y(86)]], .6, {色:灰藍});

  /* 二 · 月輪（雙環）與頭光 */
  環(x, cx, Y(42), 36*u, 1.7, 淡金);
  環(x, cx, Y(42), 36*u-8, 1.1, 微金);
  環(x, cx, Y(12.6), 9.8*u, 1.4, 淡金);

  /* 三 · 蓮座（座面68 為台面之中線） */
  x.save(); x.beginPath();
  x.ellipse(cx, Y(68), 27*u, 3.1*u, 0, 0, 7);
  x.globalCompositeOperation='destination-out'; x.fill(); x.restore();
  x.beginPath(); x.ellipse(cx, Y(68), 27*u, 3.1*u, 0, 0, 7);
  x.strokeStyle=金; x.lineWidth=2.2; x.stroke();
  勒(x, 位([[-24.5,69.4],[0,70.4],[24.5,69.4]]), 1.4);      // 台面前緣重唇
  /* 仰蓮瓣：後列先、前列後（畫序即遮擋序） */
  const 瓣 = (x0, y0, 寬, 高, w) => {
    const p = 位([[x0-寬/2,y0],[x0-寬*.42,y0+高*.55],[x0,y0+高],[x0+寬*.42,y0+高*.55],[x0+寬/2,y0]]);
    鑿(x, p); 勒(x, p, w, {閉:false});
    勒(x, 位([[x0,y0+高-.6],[x0,y0+高*.45]]), w*.6);          // 瓣脈
  };
  for (let i=-4;i<=4;i++) 瓣(i*5.4+2.7, 70.2, 4.6, 8.2, 1.5);  // 後列九瓣
  for (let i=-4;i<=4;i++) 瓣(i*5.4,     70.8, 5.2, 9.6, 1.8);  // 前列九瓣
  勒(x, 位([[-20,81.6],[0,82.6],[20,81.6]]), 2.0);             // 底緣
  勒(x, 位([[-17.5,83.4],[0,84.2],[17.5,83.4]]), 1.3);

  /* 四 · 軀幹（先鑿其面——月輪格網於身後自斷） */
  const 軀 = [[-3.6,22.5],[-13,25.6],[-15.4,33],[-15.6,42],[-12.5,47.5],[-10.8,50.5],[0,51.5],
              [10.8,50.5],[12.5,47.5],[15.6,42],[15.4,33],[13,25.6],[3.6,22.5]];
  鑿(x, 位(軀));
  for (const s of [1,-1]){                                     // 肩臂外郭：肩有峰、臂有轉
    線(x, 位([[s*2.8,23.2],[s*9,24.6],[s*12.8,26.3],[s*14.8,29.5],[s*15.2,34],[s*15.5,40.8]]), [2.6,2.3]);
    線(x, 位([[s*11.6,31.8],[s*9.4,38.5],[s*8.8,44],[s*10.6,49.2]]), [2.1,1.9]);  // 體側收腰
  }

  /* 五 · 胸飾（瓔珞先、條帛後——帛覆瓔珞之右股） */
  for (const s of [1,-1]) 線(x, 位([[s*1.2,25.2],[s*3.2,25.4],[s*4.8,26]]), [1.3,.6]);   // 鎖骨
  for (const s of [1,-1]) 線(x, 位([[s*2.4,33.7],[s*4.7,33.2],[s*6.7,33.9]]), [1.3,.6]); // 胸線
  const 珞 = 位([[-6.4,26.4],[-4,29.4],[0,30.7],[4,29.4],[6.4,26.4]]);
  勒(x, 珞, 1.5); 勒(x, 位([[-5.6,26.6],[-3.4,28.6],[0,29.6],[3.4,28.6],[5.6,26.6]]), 1.1);
  for (const [px,py] of [[-3.1,30.3],[0,31.4],[3.1,30.3]]){
    勒(x, 位([[px,py],[px,py+1.1]]), 1.1); 點(x, cx+px*u, Y(py+1.6), 2.4);
  }
  環(x, cx, Y(32.6), 3.4, 1.2); 點(x, cx, Y(33.3), 1.6);        // 心前墜珠
  const 帛心 = [[-8.2,26.2],[-3,32.5],[3.5,38.5],[8.7,44.3]];
  鑿線(x, 位(帛心), 1.9*u);                                     // 條帛清底
  線(x, 位(帛心.map(([a,b])=>[a-.75,b+.55])), [1.9,1.5]);
  線(x, 位(帛心.map(([a,b])=>[a+.75,b-.55])), [1.9,1.5]);
  for (const [a,b] of [[-4.6,30.2],[-.2,34.8],[4.6,39.6]])
    線(x, 位([[a-.4,b+.5],[a+.55,b-.35]]), [1.2,.5]);            // 帛上折痕
  勒(x, 位([[0,47.4],[0,48]]), 1.3);                             // 臍
  線(x, 位([[-3.6,46.3],[0,47],[3.6,46.3]]), [1.3,.6]);          // 腹線

  /* 六 · 腿座（體先於衣：膝作球、股作棚；鑿覆軀幹之底與座之背） */
  const 膝半 = 26;                                               // 膝寬52之半（錨）
  const 腿 = [[-10.8,49.5],[-19,52],[-24.3,55],[-膝半,58.5],[-25.2,62.5],[-22.5,65.4],[-15,66.9],
              [0,67.4],[15,66.9],[22.5,65.4],[25.2,62.5],[膝半,58.5],[24.3,55],[19,52],[10.8,49.5],[0,50.6]];
  鑿(x, 位(腿));
  for (const s of [1,-1]){
    線(x, 位([[s*10.6,49.8],[s*17,52.2],[s*23,55.6],[s*膝半,58.5],[s*25.4,61.8]]), [2.4,2.6]); // 股棚—膝外
    線(x, 位([[s*25.3,62.2],[s*20,65.2],[s*12,66.6],[s*3,67.2]]), [2.5,2.1]);                  // 底緣
  }
  const 盤線弧 = 位([[-22,62.6],[-10,63.7],[0,64],[10,63.7],[22,62.6]]);
  線(x, 盤線弧, [1.9,1.9], {入:.35,出:.35});                     // 盤線64：脛交之線（錨）
  for (const s of [1,-1]){
    線(x, 位([[s*24.6,57.4],[s*21.6,58.9],[s*19.8,61.4]]), [1.6,.8]);   // 膝球環褶
    線(x, 位([[s*23.2,56.4],[s*21,57.9],[s*19.9,59.6]]), [1.3,.6]);
    線(x, 位([[s*20,58.4],[s*12,55.6],[s*6,53.7]]), [1.7,.8]);          // 張力褶：膝拉向胯
    線(x, 位([[s*19,60.6],[s*11,58.2],[s*5.5,56.4]]), [1.6,.7]);
    線(x, 位([[s*17.5,62.6],[s*10,60.8],[s*4.5,59.5]]), [1.4,.6]);
  }
  線(x, 位([[-5,54],[0,57.4],[5,54]]), [1.5,1.5], {入:.3,出:.3});       // 裙裾燕尾三疊
  線(x, 位([[-3.6,55],[0,59.6],[3.6,55]]), [1.4,1.4], {入:.25,出:.25});
  線(x, 位([[-2.4,56.2],[0,61.4],[2.4,56.2]]), [1.3,1.3], {入:.2,出:.2});
  /* 裙腰與結帶（覆於腿上，後落筆） */
  線(x, 位([[-9.5,48.6],[0,49.3],[9.5,48.6]]), [1.8,1.8], {入:.4,出:.4});
  線(x, 位([[-9,49.8],[0,50.6],[9,49.8]]), [1.4,1.4], {入:.35,出:.35});
  環(x, cx-2.6*u, Y(49.9), 3.2, 1.3);
  線(x, 位([[-3.1,50.4],[-4.3,52.6],[-3.5,55.4]]), [1.6,.7]);
  線(x, 位([[-2.1,50.5],[-1.6,52.8],[-2.7,56.2]]), [1.5,.6]);
  /* 右足仰置左股（鑿而後勒，趾分五、踝有釧） */
  const 足 = [[5.5,62.2],[8,60.9],[12,60.6],[14.6,61.5],[15.1,63],[12.5,64.1],[8,64.3],[5.8,63.4]];
  鑿(x, 位(足)); 勒(x, 位(足), 1.7, {閉:true});
  線(x, 位([[6.6,62],[7.4,63.2],[6.9,63.9]]), [1.1,.5]);               // 足心弓
  for (let i=0;i<4;i++) 線(x, 位([[10.2+i*1.25,60.8+i*.16],[10.3+i*1.25,61.9+i*.2]]), [1.05,.5]);
  環(x, cx+14*u, Y(62.2), 1.9, 1.1);                                    // 拇趾球
  線(x, 位([[5.3,63],[6.2,61.4],[7.9,60.7]]), [1.4,.7]); 點(x, cx+6.4*u, Y(61.9), 1.7);  // 足釧

  /* 七 · 天衣（自肩後繞臂externally，飄落座緣；先清底後落墨） */
  for (const s of [1,-1]){
    const 衣a = [[s*12.5,27.5],[s*18.5,34],[s*21.5,44],[s*24.5,55],[s*28.5,63],[s*31,58.5]].map(([a,b])=>[a,b]);
    鑿線(x, 位(衣a), 8);
    線(x, 位(衣a), [1.8,1.1]);
    const 衣b = 衣a.map(([a,b])=>[a+s*1.3,b+1.1]); 衣b.pop();
    線(x, 位(衣b), [1.3,.7]);
  }

  /* 八 · 兩臂與持物（各尊自運之魂） */
  臂fn(H);

  /* 九 · 頸與三道 */
  for (const s of [1,-1]) 線(x, 位([[s*2.8,20.3],[s*3.1,23.4]]), [1.8,1.4]);
  線(x, 位([[-2.5,21.5],[0,22],[2.5,21.5]]), [1.2,.5]);
  線(x, 位([[-2.7,22.5],[0,23],[2.7,22.5]]), [1.2,.5]);

  /* 十 · 頭部（鑿面而後開——髻頂正當 頂0） */
  const 頭 = [[0,0],[4.2,1.6],[6.2,6.5],[6.6,12],[5.7,15.5],[3.3,18.6],[0,20],
              [-3.3,18.6],[-5.7,15.5],[-6.6,12],[-6.2,6.5],[-4.2,1.6]];
  鑿(x, 位(頭));
  線(x, 位([[-3.8,3],[0,0],[3.8,3]]), [1.9,1.9], {入:.4,出:.4});        // 髻頂（錨 頂0）
  線(x, 位([[-2.2,2],[0,1],[2.2,2]]), [1.1,.5]);                        // 髻紋

/* ———— 五鈷杵部件（③手持・③鈴柄・④三昧耶形 共用一構） ————
   原點＝鬼目中心，軸沿局部 y，兩端對稱；s＝px／杵單位。
   結構五部依奈良博金銅五鈷杵解說：把・鬼目・蓮弁帯・中鈷（直而稍長）・
   脇鈷（嘴形內彎抱向中鈷，樋溝陰刻）。 */
function 五鈷(x, px, py, ang, s, opt={}){
  x.save(); x.translate(px,py); x.rotate(ang);
  const P = a => a.map(([X,Y])=>[X*s, Y*s]);
  const 細 = Math.max(.7, s*.09), 中筆 = Math.max(1.0, s*.13), 骨 = Math.max(1.4, s*.17);
  const 端們 = opt.半==='上' ? [-1] : [-1,1];
  let 鈷計 = 0;
  for (const d of 端們){
    const q = a => P(a.map(([X,Y])=>[X, Y*d]));
    for (const σ of [1,-1]){                        /* 遠對脇鈷先落（後為前物所鑿） */
      線(x, q([[σ*.7,5.05],[σ*1.7,5.9],[σ*2.0,7.1],[σ*1.5,8.3],[σ*.78,9.0]]), [中筆,細*.8], {出:.05});
      鈷計++;
    }
    const 中鈷郭 = q([[-.8,5],[-.72,7.5],[-.46,9.3],[0,11],[.46,9.3],[.72,7.5],[.8,5]]);
    鑿(x, 中鈷郭);                                   /* 中鈷：直，斷面八角故樋溝二稜 */
    線(x, q([[-.8,5],[-.7,7.6],[-.44,9.4],[0,11]]), [骨,細*.6], {出:0});
    線(x, q([[.8,5],[.7,7.6],[.44,9.4],[0,11]]), [骨,細*.6], {出:0});
    if (!opt.簡){
      線(x, q([[-.3,5.2],[-.24,7.9],[0,10.3]]), [細,細*.5]);
      線(x, q([[.3,5.2],[.24,7.9],[0,10.3]]), [細,細*.5]);
    }
    鈷計++;
    for (const σ of [1,-1]){                        /* 近對脇鈷：鑿而後勒，喙尖內彎 */
      const 郭 = q([[σ*1.15,5],[σ*2.6,5.75],[σ*3.2,7.2],[σ*2.55,8.7],[σ*1.05,9.65],
                    [σ*1.35,8.3],[σ*1.15,6.9],[σ*.95,5.5]]);
      鑿(x, 郭);
      線(x, q([[σ*1.15,5],[σ*2.6,5.75],[σ*3.2,7.2],[σ*2.55,8.7],[σ*1.05,9.65]]), [骨,細*.6], {出:0});
      線(x, q([[σ*1.05,9.65],[σ*1.38,8.3],[σ*1.18,6.9],[σ*.95,5.4]]), [中筆,細*.7], {出:.15});
      if (!opt.簡) 線(x, q([[σ*1.7,5.6],[σ*2.6,6.8],[σ*2.4,8.1],[σ*1.4,9.2]]), [細,細*.5]);
      鈷計++;
    }
    const 胴 = q([[-2.05,4.25],[2.05,4.25],[1.62,5.05],[-1.62,5.05]]);
    鑿(x, 胴); 勒(x, 胴, 中筆, {閉:true});
    const 帯 = q([[-2.5,2.95],[2.5,2.95],[2.15,4.25],[-2.15,4.25]]);
    鑿(x, 帯);                                       /* 蓮弁帯：八葉間弁，前見五瓣 */
    for (let i=-2;i<=2;i++)
      線(x, q([[i*.95-.42,4.2],[i*.95-.28,3.45],[i*.95,3.0],[i*.95+.28,3.45],[i*.95+.42,4.2]]), [中筆,中筆], {入:.25,出:.25});
    勒(x, q([[-2.5,2.95],[2.5,2.95]]), 中筆);
    勒(x, q([[-2.15,4.25],[2.15,4.25]]), 中筆);
    勒(x, q([[-2.28,2.62],[2.28,2.62]]), 細);        /* 紐 */
  }
  const 把底 = opt.半==='上' ? 1.25 : 2.62;          /* 把：中鼓束腰 */
  const 把郭 = [[-1.5,-2.62],[-1.92,0],[-1.5,把底],[1.5,把底],[1.92,0],[1.5,-2.62]].map(([X,Y])=>[X*s,Y*s]);
  鑿(x, 把郭);
  線(x, P([[-1.5,-2.62],[-1.94,0],[-1.5,把底]]), [中筆,中筆], {入:.3,出:.3});
  線(x, P([[1.5,-2.62],[1.94,0],[1.5,把底]]), [中筆,中筆], {入:.3,出:.3});
  if (!opt.簡){                                      /* 鬼目：二重圈楕圓，前一全側二半 */
    橢(x, 0, 0, .72*s, .95*s, 細); 橢(x, 0, 0, .45*s, .62*s, 細); 點(x, 0, 0, Math.max(1.1, s*.1));
    for (const σ of [1,-1]) 橢(x, σ*1.55*s, 0, .3*s, .75*s, 細);
  } else 橢(x, 0, 0, .5*s, .66*s, 細);
  x.restore();
  return 鈷計;
}

/* 五鈷鈴：鐘身＋半截五鈷柄；px,py＝鈴口中心 */
function 五鈷鈴(x, px, py, s){
  const P = a => a.map(([X,Y])=>[px+X*s, py+Y*s]);
  const 身 = [[-3.1,0],[-2.92,-1.6],[-2.3,-2.9],[-1.55,-3.5],[1.55,-3.5],[2.3,-2.9],[2.92,-1.6],[3.1,0],[0,.85]];

  線(x, P([[3.1,0],[2.94,-1.6],[2.3,-2.9],[1.5,-3.5]]), [1.8,1.3]);
  線(x, P([[-1.6,-3.52],[0,-3.68],[1.6,-3.52]]), [1.4,1.4], {入:.3,出:.3});
  線(x, P([[-3.1,-.02],[0,.85],[3.1,-.02]]), [1.9,1.9], {入:.25,出:.25});   /* 口唇前弧 */
  線(x, P([[-2.7,-.5],[0,.2],[2.7,-.5]]), [1,1], {入:.2,出:.2});            /* 口內陰 */

  const s柄 = s*.44;
