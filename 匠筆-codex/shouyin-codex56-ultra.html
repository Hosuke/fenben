<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>十四手印白描卷 · Codex 5.6 ultra</title>
  <style>
    :root {
      color-scheme: dark;
      --夜: #111724;
      --夜深: #090d15;
      --紙: #eee8dc;
      --淡: #a8acb2;
      --界: rgba(238, 232, 220, .17);
      --朱: #aa604d;
    }
    * { box-sizing: border-box; }
    html { background: var(--夜深); }
    body {
      margin: 0;
      min-width: 300px;
      color: var(--紙);
      background:
        radial-gradient(1000px 680px at 14% -10%, #202a3b 0%, transparent 62%),
        radial-gradient(820px 760px at 100% 42%, #171e2d 0%, transparent 68%),
        var(--夜深);
      font-family: "Songti TC", "STSong", "Noto Serif TC", "Yu Mincho", serif;
    }
    main { width: min(1540px, calc(100% - 52px)); margin: 0 auto; padding: 76px 0 110px; }
    header { display: grid; grid-template-columns: auto 1fr; gap: 46px; align-items: start; margin-bottom: 72px; }
    .題簽 {
      writing-mode: vertical-rl;
      padding: 21px 14px 17px;
      border: 1px solid rgba(238, 232, 220, .36);
      letter-spacing: .24em;
      font-size: clamp(34px, 4.2vw, 58px);
      line-height: 1.05;
      font-weight: 400;
    }
    .引 { max-width: 780px; padding-top: 9px; }
    .引 .小題 { color: #c7bdaa; font-size: 13px; letter-spacing: .42em; margin-bottom: 15px; }
    .引 p { margin: 0; color: var(--淡); font-size: 14px; line-height: 2.15; text-align: justify; }
    .引 b { color: var(--紙); font-weight: 400; }
    .譜 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 62px 42px;
    }
    figure { margin: 0; min-width: 0; }
    .畫境 {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 44%, rgba(44, 56, 76, .58), rgba(14, 19, 29, .9) 76%),
        var(--夜);
      border: 1px solid var(--界);
      box-shadow: 0 19px 44px rgba(0, 0, 0, .25);
    }
    .畫境::before, .畫境::after {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      pointer-events: none;
      border-color: rgba(238, 232, 220, .36);
      border-style: solid;
    }
    .畫境::before { left: 13px; top: 13px; border-width: 1px 0 0 1px; }
    .畫境::after { right: 13px; bottom: 13px; border-width: 0 1px 1px 0; }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 9 / 6.8;
      background: transparent;
    }
    figcaption { padding: 19px 4px 0; }
    .名行 { display: flex; align-items: baseline; gap: 13px; padding-bottom: 12px; border-bottom: 1px solid var(--界); }
    h2 { margin: 0; font-size: 22px; font-weight: 400; letter-spacing: .18em; }
    .序 { margin-left: auto; color: #7d8490; font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .12em; }
    .句 { margin: 11px 0 0; color: var(--淡); font-size: 13px; line-height: 1.92; text-align: justify; }
    .句 b { margin-right: .7em; color: #d4c5ad; font-weight: 400; letter-spacing: .16em; }
    .據 { color: #858b95; }
    footer { margin-top: 88px; padding-top: 22px; border-top: 1px solid var(--界); color: #777f8b; font-size: 12px; line-height: 1.9; letter-spacing: .08em; }
    @media (max-width: 850px) {
      main { width: min(690px, calc(100% - 30px)); padding-top: 38px; }
      header { gap: 24px; margin-bottom: 48px; }
      .題簽 { font-size: 34px; padding: 15px 10px 12px; }
      .譜 { grid-template-columns: 1fr; gap: 54px; }
    }
    @media (max-width: 470px) {
      main { width: calc(100% - 22px); }
      header { display: block; }
      .題簽 { writing-mode: horizontal-tb; display: inline-block; margin-bottom: 22px; }
      h2 { font-size: 19px; }
      .句 { font-size: 12.5px; }
    }
    @media print {
      html, body { background: #fff; color: #111; }
      main { width: 100%; padding: 0; }
      .畫境 { background: #151b27; break-inside: avoid; }
      figure { break-inside: avoid; }
    }
  </style>
</head>
<body>
<main>
  <header>
    <div class="題簽">十四手印白描卷</div>
    <div class="引">
      <div class="小題">左定右慧 · 指指有名 · 線線知隱</div>
      <p><b>此卷惟線，不施肉色。</b>十四印各據逐指法另起骨架；指節、掌丘、腕脈俱以三等筆分層，
      相掩處先鑿後勒。畫布本身始終透明，眼前深底只由頁面承托，便於驗其遮斷真偽。</p>
    </div>
  </header>
  <section class="譜" id="印譜" aria-label="十四手印格陣"></section>
  <footer>匠筆自運 · Canvas 活渲 · 無外部字體、圖像、腳本或資料請求。拇指二節，餘指三節；比例屬畫法，不偽稱經定。</footer>
</main>

<!--
  headless 自校返工實錄（Playwright Core 1.61.1 + Chrome Headless Shell 149；深底只在 CSS／截圖層合成，canvas bitmap 未鋪底）：

  第一輪｜1600×1000，DPR 1，全卷：十四幅均渲染，76/76 初版斷言過，無 console/pageerror、無橫溢。
          目視見內外縛過似編帶，智拳右拇肥如囊且左頭指尖難讀，彌陀雙捻成尖三角。遂縮內縛於窄縫、
          令外縛諸指只跨對掌；智拳另起上下拳骨架；彌陀先改橢圓弧。
  第二輪｜1280×900，DPR 2，四難幅近看：查出內縛右掌郭之鏡算誤置，故生兩大異環；修正鏡形後，
          八指逐路入縫、二拇短交。外縛八梢添甲弧；智拳下腕去鉤；彌陀補圓頂與根弧。
  第三輪｜760×1000，DPR 2，窄幅全卷兼四難幅：十四卡零重疊、零橫溢，每卡恰一 canvas、一結法、
          一所據。內外縛與智拳已清；彌陀仍偏拱尖，遂重構為「指莖＋內外雙郭橢圓」，環心真鑿透明。
  第四輪｜1600×1000，DPR 2，全卷兼六難幅：造形定稿；新增之像素單色斷言誤把極低 alpha 抗鋸齒
          反量化當異色，乃改驗 alpha≥32 主線色相（非放寬畫色）。如來拳另鑿右拳下緣入口，補左豎拇
          外露根段；彌陀指莖去方帽。
  第五輪｜1440×1000，DPR 2，終證：105/105 console.assert 全過；console error、pageerror 皆零；
          全頁惟一 file:// 文件請求，十四畫布角隅與彌陀雙環心俱透明，題序、題注、順序與窄寬排版悉核。
-->

<script>
(() => {
  'use strict';

  const W = 900;
  const H = 680;
  const 墨 = '#eee8dc';
  const 印目 = [
    {
      名: '金剛拳',
      法: '大指收入掌中，餘食、中、無名、小四指屈握其外。',
      據: '《大日經疏》卷十三（T39n1796）六種拳條；逐指今譯見《手印體系》。'
    },
    {
      名: '忿怒拳',
      法: '先成金剛拳，獨豎頭指與小指屈作二鈎，令二鈎相向。',
      據: '《大日經疏》卷十三（T39n1796）六種拳條；逐指今譯見《手印體系》。'
    },
    {
      名: '蓮華拳',
      法: '四指屈握，大指橫壓頭指外側節；本幅取壓式。',
      據: '《大日經疏》卷十三（T39n1796）六種拳條；大指立、壓兩式並傳，定本尚待核。'
    },
    {
      名: '內縛',
      法: '兩掌相合，十指交縛於掌內，外惟見兩手背及沒入中縫之指根。',
      據: '《大日經疏》卷十三（T39n1796）六種拳條；逐指今譯見《手印體系》。'
    },
    {
      名: '外縛',
      法: '兩掌相合，十指交縛於掌外，諸指頭皆露於外。',
      據: '《大日經疏》卷十三（T39n1796）六種拳條；逐指今譯見《手印體系》。'
    },
    {
      名: '如來拳',
      法: '右手金剛拳居上，左手蓮華拳居下，豎左大指納入右拳。',
      據: '《大日經疏》卷十三（T39n1796）六種拳條；逐指今譯見《手印體系》。'
    },
    {
      名: '智拳印',
      法: '左金剛拳獨豎頭指，右金剛拳包握之，右大指端正拄左頭指端。',
      據: '《手印體系》常用印逐指表；「右小指握」之坊說為訛，勿從。'
    },
    {
      名: '法界定印',
      法: '兩手仰掌相疊，右上左下，二大指端相拄而成橢圓。',
      據: '《手印體系》常用印逐指表；該卷以 Saunders《Mudrā》為框架並參 SAT 圖像部。'
    },
    {
      名: '彌陀定印',
      法: '基形同定印，兩頭指各自屈起捻本手大指，結成左右雙環；此取上品式。',
      據: '《手印體系》九品條及《新纂浄土宗大辞典》九品印；九品系統至江戶《佛像圖彙》（1690）始系統化，勿托古。'
    },
    {
      名: '施無畏印',
      法: '屈臂上舉，掌面向外，五指逐節舒伸而略有自然分張。',
      據: '《手印體系》常用印逐指表；框架參 Saunders《Mudrā》及 SAT 圖像部。'
    },
    {
      名: '與願印',
      法: '掌面向外，五指舒展而向下垂落。',
      據: '《手印體系》常用印逐指表；框架參 Saunders《Mudrā》及 SAT 圖像部。'
    },
    {
      名: '觸地印',
      法: '右手覆膝，五指垂下使指端觸地；左手仰掌安於臍前。',
      據: '《手印體系》常用印逐指表；框架參 Saunders《Mudrā》及 SAT 圖像部。'
    },
    {
      名: '說法印',
      法: '兩手當胸，各以大指與頭指相捻成環，左手在內、右手在外相對。',
      據: '《手印體系》常用印逐指表；另有捻中指式，dharmacakra 之屬尚標〔待核〕。'
    },
    {
      名: '期剋印',
      法: '作金剛拳，獨豎頭指屈若威嚇之鈎；本幅取單鈎式。',
      據: '《手印體系》常用印逐指表，載 tarjanī 威嚇鈎召義；亦有兼豎小指之二鈎式。'
    }
  ];

  const 自證 = { total: 0, passed: 0, names: [] };
  window.__手印自證 = 自證;

  const 證 = (條件, 名, 細 = '') => {
    自證.total += 1;
    if (條件) { 自證.passed += 1; 自證.names.push(名); }
    console.assert(條件, 名, 細);
  };

  const 距 = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
  const 接 = (名, a, b, 容 = .01) => 證(距(a, b) <= 容, 名, { a, b, 距: 距(a, b) });

  class 筆室 {
    constructor(canvas, 名) {
      this.canvas = canvas;
      this.名 = 名;
      this.dpr = Math.min(2.5, Math.max(1, window.devicePixelRatio || 1));
      canvas.width = Math.round(W * this.dpr);
      canvas.height = Math.round(H * this.dpr);
      this.ctx = canvas.getContext('2d', { alpha: true });
      this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
      this.ctx.strokeStyle = 墨;
      this.ctx.lineCap = 'round';
      this.ctx.lineJoin = 'round';
      this.骨 = 7.2;
      this.節 = 4.8;
      this.紋 = 3.15;
      this.鑿寬 = 16;
      this.指冊 = [];
      this.交錯 = [];
    }
    徑(寫) { const p = new Path2D(); 寫(p); return p; }
    勒(p, 寬 = this.骨, 濃 = 1) {
      const c = this.ctx;
      c.save();
      c.globalCompositeOperation = 'source-over';
      c.globalAlpha = 濃;
      c.lineWidth = 寬;
      c.stroke(p);
      c.restore();
    }
    鑿(p, 寬 = this.鑿寬, 填 = true) {
      const c = this.ctx;
      c.save();
      c.globalCompositeOperation = 'destination-out';
      if (填) c.fill(p);
      c.lineWidth = 寬;
      c.stroke(p);
      c.restore();
    }
    蔽勒(蔽徑, 見徑 = 蔽徑, 寬 = this.骨, 鑿寬 = this.鑿寬) {
      this.鑿(蔽徑, 鑿寬, true);
      this.勒(見徑, 寬);
      return 蔽徑;
    }
    線(寫, 寬 = this.節, 濃 = 1) { const p = this.徑(寫); this.勒(p, 寬, 濃); return p; }
    節紋(x1, y1, x2, y2, 弓 = 0, 濃 = .84) {
      return this.線(p => {
        p.moveTo(x1, y1);
        p.quadraticCurveTo((x1 + x2) / 2, (y1 + y2) / 2 + 弓, x2, y2);
      }, this.紋, 濃);
    }
    置(x, y, 比, 轉, 鏡, 寫) {
      const c = this.ctx;
      c.save();
      c.translate(x, y);
      c.rotate(轉);
      c.scale(比 * 鏡, 比);
      寫();
      c.restore();
    }
    登指(手, 指, 節數, 見 = true) {
      this.指冊.push(Object.freeze({ 手, 指, 節數, 見 }));
    }
  }

  const 指名 = Object.freeze(['小', '無名', '中', '頭']);

  function 立指(b, x, 根Y, 頂Y, 寬根, 寬梢, 偏 = 0, 甲 = false) {
    const h = 根Y - 頂Y;
    const 蔽 = b.徑(p => {
      p.moveTo(x - 寬根 / 2, 根Y + 8);
      p.bezierCurveTo(x - 寬根 * .48, 根Y - h * .28, x + 偏 - 寬梢 * .53, 頂Y + 33, x + 偏, 頂Y);
      p.bezierCurveTo(x + 偏 + 寬梢 * .52, 頂Y + 2, x + 寬根 * .50, 根Y - h * .28, x + 寬根 / 2, 根Y + 8);
      p.closePath();
    });
    const 見 = b.徑(p => {
      p.moveTo(x - 寬根 / 2, 根Y + 8);
      p.bezierCurveTo(x - 寬根 * .48, 根Y - h * .28, x + 偏 - 寬梢 * .53, 頂Y + 33, x + 偏, 頂Y);
      p.bezierCurveTo(x + 偏 + 寬梢 * .52, 頂Y + 2, x + 寬根 * .50, 根Y - h * .28, x + 寬根 / 2, 根Y + 8);
    });
    b.蔽勒(蔽, 見, b.骨, b.鑿寬 * .9);
    b.節紋(x - 寬根 * .36, 根Y - h * .31, x + 寬根 * .36, 根Y - h * .31, 6);
    b.節紋(x - 寬根 * .32 + 偏 * .42, 根Y - h * .61, x + 寬根 * .32 + 偏 * .42, 根Y - h * .61, 5);
    if (甲) b.線(p => {
      p.moveTo(x + 偏 - 寬梢 * .24, 頂Y + 26);
      p.quadraticCurveTo(x + 偏, 頂Y + 11, x + 偏 + 寬梢 * .24, 頂Y + 26);
    }, b.紋, .76);
    return 蔽;
  }

  function 鈎指(b, x, 根Y, 向, 尺 = 1) {
    const 端 = { x: x + 向 * 52 * 尺, y: 根Y - 260 * 尺 };
    const 蔽 = b.徑(p => {
      p.moveTo(x - 38 * 尺, 根Y + 8);
      p.bezierCurveTo(x - 45 * 尺, 根Y - 100 * 尺, x - 35 * 尺, 根Y - 220 * 尺, x - 3 * 尺, 根Y - 286 * 尺);
      p.bezierCurveTo(x + 19 * 尺, 根Y - 326 * 尺, x + 向 * 81 * 尺, 根Y - 307 * 尺, 端.x, 端.y);
      p.bezierCurveTo(x + 向 * 28 * 尺, 根Y - 250 * 尺, x + 35 * 尺, 根Y - 174 * 尺, x + 38 * 尺, 根Y + 8);
      p.closePath();
    });
    const 見 = b.徑(p => {
      p.moveTo(x - 38 * 尺, 根Y + 8);
      p.bezierCurveTo(x - 45 * 尺, 根Y - 100 * 尺, x - 35 * 尺, 根Y - 220 * 尺, x - 3 * 尺, 根Y - 286 * 尺);
      p.bezierCurveTo(x + 19 * 尺, 根Y - 326 * 尺, x + 向 * 81 * 尺, 根Y - 307 * 尺, 端.x, 端.y);
      p.bezierCurveTo(x + 向 * 28 * 尺, 根Y - 250 * 尺, x + 35 * 尺, 根Y - 174 * 尺, x + 38 * 尺, 根Y + 8);
    });
    b.蔽勒(蔽, 見);
    b.節紋(x - 29 * 尺, 根Y - 91 * 尺, x + 28 * 尺, 根Y - 91 * 尺, 6 * 尺);
    b.節紋(x - 25 * 尺, 根Y - 181 * 尺, x + 28 * 尺, 根Y - 181 * 尺, 5 * 尺);
    return { 蔽, 端 };
  }

  function 開掌(b, { 背 = false, 張 = 1, 甲 = false } = {}) {
    // 局部坐標：腕向下、指向上。掌郭先落，諸指後落以真鑿指根。
    const 掌蔽 = b.徑(p => {
      p.moveTo(-73, 275);
      p.bezierCurveTo(-92, 212, -118, 156, -132, 84);
      p.bezierCurveTo(-143, 24, -130, -55, -105, -104);
      p.bezierCurveTo(-55, -135, 42, -140, 99, -103);
      p.bezierCurveTo(135, -78, 144, -24, 139, 31);
      p.bezierCurveTo(150, 88, 128, 178, 75, 275);
      p.closePath();
    });
    const 掌見 = b.徑(p => {
      p.moveTo(-73, 275);
      p.bezierCurveTo(-92, 212, -118, 156, -132, 84);
      p.bezierCurveTo(-143, 24, -130, -55, -105, -104);
      p.moveTo(99, -103);
      p.bezierCurveTo(135, -78, 144, -24, 139, 31);
      p.bezierCurveTo(150, 88, 128, 178, 75, 275);
    });
    b.蔽勒(掌蔽, 掌見, b.骨, b.鑿寬 * 1.1);

    const 列 = [
      [-104, -78, -278, 70, 51, -22 * 張, '小'],
      [-38, -108, -345, 75, 52, -9 * 張, '無名'],
      [32, -112, -374, 78, 53, 2 * 張, '中'],
      [96, -82, -326, 72, 50, 15 * 張, '頭']
    ];
    for (const [x, 根, 頂, 寬根, 寬梢, 偏, 名] of 列) {
      立指(b, x, 根, 頂, 寬根, 寬梢, 偏, 背 || 甲);
      b.登指('掌', 名, 3, true);
    }

    const 拇蔽 = b.徑(p => {
      p.moveTo(119, 44);
      p.bezierCurveTo(152, 4, 188, -37, 231, -61);
      p.bezierCurveTo(261, -77, 288, -52, 277, -24);
      p.bezierCurveTo(255, 32, 211, 83, 152, 121);
      p.closePath();
    });
    const 拇見 = b.徑(p => {
      p.moveTo(119, 44);
      p.bezierCurveTo(152, 4, 188, -37, 231, -61);
      p.bezierCurveTo(261, -77, 288, -52, 277, -24);

      const 見 = b.徑(p => {
        p.moveTo(根.x + nx, 根.y + ny);
        p.bezierCurveTo(根.x + dx * .34 + nx, 根.y + dy * .24 + ny, 端.x + nx, 端.y + 24 + ny, 端.x + nx, 端.y + ny);
        p.moveTo(端.x - nx, 端.y - ny);
        p.bezierCurveTo(端.x - nx, 端.y + 24 - ny, 根.x + dx * .34 - nx, 根.y + dy * .24 - ny, 根.x - nx, 根.y - ny);
      });
      b.蔽勒(蔽, 見, 節數 === 2 ? b.骨 : b.節, b.鑿寬 * .72);
      const mx = (根.x + 端.x) / 2, my = (根.y + 端.y) / 2;
      b.節紋(mx + nx * .62, my + ny * .62, mx - nx * .62, my - ny * .62, 3);
    };
    指莖(頭根, 接左下, 31, 3);
    指莖(拇根, 接右下, 36, 2);

    // 外橢圓先鑿穿其後掌線，再以內外雙郭勒成一指寬；全程無 source-over 填色。
    const 外 = b.徑(p => p.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2));
    const 內 = b.徑(p => p.ellipse(cx, cy + 2, rx - 29, ry - 31, 0, 0, Math.PI * 2));
    b.鑿(外, b.鑿寬 * .68, true);
    b.勒(外, b.骨);
    b.勒(內, b.節);
    b.線(p => {
      p.moveTo(cx - 12, 接點.y + 9); p.quadraticCurveTo(cx, 接點.y - 2, cx + 12, 接點.y + 9);
      p.moveTo(cx - rx + 6, cy - 8); p.quadraticCurveTo(cx - rx + 18, cy, cx - rx + 7, cy + 11);
      p.moveTo(cx + rx - 6, cy - 8); p.quadraticCurveTo(cx + rx - 18, cy, cx + rx - 7, cy + 11);
    }, b.紋, .76);
    b.登指(手, '頭', 3, true); b.登指(手, '大', 2, true);
    return { 頭端: 接點, 拇端: 接點, 中心: { x: cx, y: cy } };
  }

  function 說法半手(b, { 手, x, y, 鏡 = 1, 背 = false, 尺 = .72 }) {
    const 局接 = Object.freeze({ x: 126, y: 58 });
    b.置(x, y, 尺, 0, 鏡, () => {
      const 掌 = b.徑(p => {
        p.moveTo(-72, 278); p.bezierCurveTo(-105, 195, -112, 95, -92, 3);
        p.bezierCurveTo(-69, -59, 2, -88, 73, -61); p.bezierCurveTo(126, -37, 145, 29, 132, 92);
        p.bezierCurveTo(126, 161, 106, 224, 74, 279); p.closePath();
      });
      b.蔽勒(掌, 掌, b.骨, b.鑿寬);
      const rows = [
        [-62, -22, -288, 63, 45, -17, '小'],
        [1, -49, -350, 70, 48, -4, '無名'],
        [61, -40, -320, 68, 47, 12, '中']
      ];
      for (const [xx, root, tip, w0, w1, off, 指] of rows) {
        立指(b, xx, root, tip, w0, w1, off, 背);
        b.登指(手, 指, 3, true);
      }

      const 頭蔽 = b.徑(p => {
        p.moveTo(84, -44); p.bezierCurveTo(132, -32, 163, 3, 局接.x, 局接.y);
        p.bezierCurveTo(111, 76, 90, 66, 76, 46); p.bezierCurveTo(52, 10, 52, -27, 84, -44); p.closePath();
      });
      b.蔽勒(頭蔽, 頭蔽, b.節, b.鑿寬 * .72); b.節紋(91, -9, 139, 12, 3); b.節紋(91, 22, 132, 44, 3);
      const 拇蔽 = b.徑(p => {
        p.moveTo(106, 112); p.bezierCurveTo(135, 93, 144, 75, 局接.x, 局接.y);
        p.bezierCurveTo(112, 48, 91, 57, 75, 76); p.bezierCurveTo(57, 99, 76, 127, 106, 112); p.closePath();
      });
      b.蔽勒(拇蔽, 拇蔽, b.骨, b.鑿寬 * .74); b.節紋(81, 83, 119, 105, 3);
      if (背) b.線(p => {
        p.moveTo(-35, 222); p.bezierCurveTo(-28, 130, -15, 45, -2, -36);
        p.moveTo(29, 226); p.bezierCurveTo(40, 133, 52, 52, 60, -24);
      }, b.紋, .61);
      else b.線(p => {
        p.moveTo(-73, 47); p.bezierCurveTo(-20, 22, 35, 27, 79, 52);
        p.moveTo(-66, 107); p.bezierCurveTo(-4, 82, 47, 91, 88, 119);
        p.moveTo(82, 12); p.bezierCurveTo(52, 59, 43, 119, 48, 172);
      }, b.紋, .74);
      b.線(p => { p.moveTo(-59, 277); p.quadraticCurveTo(0, 253, 58, 278); }, b.紋, .7);
      b.登指(手, '頭', 3, true); b.登指(手, '大', 2, true);
    });
    const 外接 = Object.freeze({ x: x + 鏡 * 尺 * 局接.x, y: y + 尺 * 局接.y });
    return { 頭端: 外接, 拇端: 外接 };
  }

  繪印.法界定印 = b => {
    臥掌基(b, { 手: '左', 向: 1, y: 405, 尺: .92 });
    臥掌基(b, { 手: '右', 向: -1, y: 350, 尺: .92 });
    const 接點 = Object.freeze({ x: 450, y: 190 });
    const 左端 = Object.freeze({ ...接點 });
    const 右端 = Object.freeze({ ...接點 });
    仰拇至(b, { 手: '左', 根: { x: 343, y: 352 }, 端: 左端, 側: 1 });
    仰拇至(b, { 手: '右', 根: { x: 557, y: 301 }, 端: 右端, 側: -1, 前: true });
    接('法界定印：二大指端共錨相拄', 左端, 右端);
    證(b.指冊.filter(v => v.手 === '左').length === 5 && b.指冊.filter(v => v.手 === '右').length === 5,
      '法界定印：右上左下各五指俱全');
  };

  繪印.彌陀定印 = b => {
    臥掌基(b, { 手: '左', 向: 1, y: 414, 略頭: true, 尺: .91 });
    臥掌基(b, { 手: '右', 向: -1, y: 355, 略頭: true, 尺: .91 });
    const 左環 = 定印圓環(b, { 手: '左', cx: 350, cy: 270, 頭根: { x: 309, y: 362 }, 拇根: { x: 412, y: 365 } });
    const 右環 = 定印圓環(b, { 手: '右', cx: 550, cy: 260, 頭根: { x: 591, y: 310 }, 拇根: { x: 488, y: 315 } });
    接('彌陀定印：左頭指端與左大指端共錨捻合', 左環.頭端, 左環.拇端);
    接('彌陀定印：右頭指端與右大指端共錨捻合', 右環.頭端, 右環.拇端);
    證(距(左環.頭端, 右環.頭端) > 150, '彌陀定印：左右雙環分立，非二頭指互捻');
    const 左心甲 = b.ctx.getImageData(Math.round(左環.中心.x * b.dpr), Math.round(左環.中心.y * b.dpr), 1, 1).data[3];
    const 右心甲 = b.ctx.getImageData(Math.round(右環.中心.x * b.dpr), Math.round(右環.中心.y * b.dpr), 1, 1).data[3];
    證(左心甲 === 0 && 右心甲 === 0, '彌陀定印：雙環中心俱鑿穿見底', { 左心甲, 右心甲 });
    證(b.指冊.filter(v => v.手 === '左').length === 5 && b.指冊.filter(v => v.手 === '右').length === 5,
      '彌陀定印：兩手各五指俱全');
  };

  繪印.施無畏印 = b => {
    b.置(418, 359, .90, -.025, 1, () => 開掌(b, { 背: false, 張: 1 }));
    證(b.指冊.length === 5 && b.指冊.every(v => v.節數 === (v.指 === '大' ? 2 : 3)),
      '施無畏印：五指節數合解剖定數');
  };

  繪印.與願印 = b => {
    // 下垂式略偏腕而非機械正倒；掌紋仍向觀者。
    b.置(489, 328, .86, Math.PI - .13, 1, () => 開掌(b, { 背: false, 張: .76 }));
    證(b.指冊.length === 5, '與願印：下垂五指俱有交代');
  };

  繪印.觸地印 = b => {
    // 遠層：左仰掌安臍前及膝線；近層右手覆膝垂地，真鑿其後之線。
    b.線(p => {
      p.moveTo(55, 430); p.bezierCurveTo(230, 326, 462, 315, 668, 390);
      p.moveTo(87, 493); p.bezierCurveTo(268, 410, 493, 411, 714, 492);
    }, b.節, .52);
    臥掌基(b, { 手: '左', 向: 1, y: 380, 尺: .48 });
    const 左拇端 = { x: 299, y: 299 };
    仰拇至(b, { 手: '左', 根: { x: 246, y: 360 }, 端: 左拇端, 側: 1 });
    b.置(552, 337, .76, Math.PI + .035, 1, () => 開掌(b, { 背: true, 張: .42, 甲: true }));
    const 地Y = 629;
    b.線(p => { p.moveTo(345, 地Y); p.quadraticCurveTo(590, 地Y - 8, 806, 地Y); }, b.紋, .7);
    const 中指端Y = 337 + 374 * .76;
    證(Math.abs(中指端Y - 地Y) < 10, '觸地印：右中指端抵地線', { 中指端Y, 地Y });
    證(b.指冊.filter(v => v.手 === '左').length === 5 && b.指冊.filter(v => v.手 === '掌').length === 5,
      '觸地印：右覆膝、左安臍之十指俱全');
  };

  繪印.說法印 = b => {
    const 左 = 說法半手(b, { 手: '左', x: 327, y: 381, 鏡: -1, 背: true, 尺: .73 });
    const 右 = 說法半手(b, { 手: '右', x: 573, y: 362, 鏡: 1, 背: false, 尺: .73 });
    接('說法印：左頭指與左大指端共錨成環', 左.頭端, 左.拇端);
    接('說法印：右頭指與右大指端共錨成環', 右.頭端, 右.拇端);
    證(b.指冊.filter(v => v.手 === '左').length === 5 && b.指冊.filter(v => v.手 === '右').length === 5,
      '說法印：左內右外各五指俱全');
  };

  繪印.期剋印 = b => {
    b.置(450, 420, 1.0, 0, 1, () => 拳身(b, { 手: '右', 豎頭: true, 鈎頭: true }));
    證(b.指冊.filter(v => v.指 === '頭' && v.見).length === 1, '期剋印：惟頭指一鈎，未混忿怒二鈎');
    證(b.指冊.find(v => v.指 === '小' && v.見), '期剋印：小指仍屈握而不豎');
    證(b.指冊.find(v => v.指 === '大' && !v.見), '期剋印：從金剛拳，拇藏掌內');
  };

  // __DRAWINGS__

  function 造幅(項, i) {
    const figure = document.createElement('figure');
    figure.dataset.name = 項.名;
    figure.innerHTML = `
      <div class="畫境"><canvas aria-label="${項.名}白描"></canvas></div>
      <figcaption>
        <div class="名行"><h2>${項.名}</h2><span class="序">${String(i + 1).padStart(2, '0')} / 14</span></div>
        <p class="句 法"><b>結法</b>${項.法}</p>
        <p class="句 據"><b>所據</b>${項.據}</p>
      </figcaption>`;
    document.getElementById('印譜').appendChild(figure);
    const canvas = figure.querySelector('canvas');
    const b = new 筆室(canvas, 項.名);
    繪印[項.名](b);
    證(b.ctx.globalCompositeOperation === 'source-over', `${項.名}：鑿法畢而合成模式歸正`);
    證(b.指冊.length >= 5, `${項.名}：至少五指有逐指名冊`, b.指冊);
    const 角 = b.ctx.getImageData(0, 0, 2, 2).data;
    證([...角].every((v, n) => n % 4 !== 3 || v === 0), `${項.名}：畫布角隅透明，未鋪底`);
    const 像 = b.ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    let 透明 = 0, 有線 = 0, 驗色 = 0, 異色 = 0;
    for (let n = 0; n < 像.length; n += 4) {
      if (像[n + 3] === 0) 透明 += 1;
      else {
        有線 += 1;
        // 極低 alpha 之抗鋸齒像素經 un-premultiply 會有量化漂移，故只驗 alpha≥32 之主線色相。
        if (像[n + 3] >= 32) {
          驗色 += 1;
          if (Math.abs(像[n] - 238) > 5 || Math.abs(像[n + 1] - 232) > 5 || Math.abs(像[n + 2] - 220) > 5) 異色 += 1;
        }
      }
    }
    證(透明 > canvas.width * canvas.height * .80 && 有線 > 1000, `${項.名}：透明為底而線量非空`, { 透明, 有線 });
    證(b.ctx.strokeStyle === 墨 && 異色 / 驗色 < .005, `${項.名}：可見主線惟一色相`, { 異色, 驗色 });
    canvas.dataset.fingers = String(b.指冊.length);
    canvas.dataset.rendered = 'true';
  }

  印目.forEach(造幅);
  證(document.querySelectorAll('figure').length === 14, '全卷：十四幅俱在');
  證(document.querySelectorAll('canvas').length === 14, '全卷：每幅恰一透明畫布');
  證(!document.querySelector('script[src],link[rel="stylesheet"],img'), '全卷：無外部腳本、樣式或圖像依賴');
  證(自證.total === 自證.passed, '全卷：此前自證悉過', 自證);
  document.documentElement.dataset.rendered = 'true';
})();
</script>
</body>
