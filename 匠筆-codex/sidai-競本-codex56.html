<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>四題競本 · Codex 5.6 卷</title>
  <style>
    :root {
      --夜: #171613;
      --金: #d6c28c;
      --淡金: #9b8d68;
      --紙: #f2ecdc;
      --墨: #292620;
      --界: rgba(214, 194, 140, .24);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--夜); color: var(--金); }
    body {
      font-family: "Songti TC", "Noto Serif CJK TC", "Source Han Serif TC", "Hiragino Mincho ProN", serif;
      text-rendering: optimizeLegibility;
    }
    main { min-height: 100vh; padding: 22px 18px 26px; }
    header, .卷, footer { width: min(1900px, 100%); margin-inline: auto; }
    header { display: flex; align-items: baseline; gap: 22px; border-bottom: 1px solid var(--界); padding-bottom: 12px; }
    h1 { margin: 0; font-size: clamp(25px, 2.4vw, 38px); font-weight: 600; letter-spacing: .08em; }
    .序 { color: var(--淡金); font-size: 12px; line-height: 1.7; }
    .卷 {
      display: grid;
      grid-template-columns: repeat(4, minmax(250px, 1fr));
      gap: 14px;
      margin-top: 16px;
      align-items: start;
    }
    figure { margin: 0; min-width: 0; }
    .畫框 { padding: 8px; border: 1px solid var(--界); background: #11100e; }
    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 520 / 700;
      background:
        radial-gradient(ellipse at 52% 38%, rgba(255,255,255,.42), transparent 58%),
        linear-gradient(103deg, rgba(78,65,40,.025), transparent 28%, rgba(78,65,40,.018) 67%, transparent),
        var(--紙);
    }
    figcaption { min-height: 76px; padding: 10px 3px 0; line-height: 1.6; color: var(--淡金); font-size: 12px; }
    figcaption b { display: block; color: var(--金); font-size: 14px; font-weight: 600; letter-spacing: .06em; }
    footer { border-top: 1px solid var(--界); margin-top: 14px; padding-top: 10px; color: var(--淡金); font-size: 11px; line-height: 1.6; }
    @media (max-width: 1080px) {
      .卷 { overflow-x: auto; grid-template-columns: repeat(4, minmax(300px, 1fr)); padding-bottom: 8px; }
      header { display: block; }
      .序 { margin-top: 5px; }
    }
  </style>
</head>
<body>
<main>
  <header>
    <h1>四題競本</h1>
    <div class="序">Codex 5.6 卷 · T1419 百二十指制 · 白描單色無填 · 線身比 1:159 · 畫序即遮擋序</div>
  </header>

  <section class="卷" aria-label="四題白描並列">
    <figure>
      <div class="畫框"><canvas id="智拳" width="520" height="700" aria-label="智拳印獨幅"></canvas></div>
      <figcaption><b>一 · 智拳印獨幅</b>左拳立頭指，右拳四指逐節繞握；右拇指自拳背上蟠，端拄左頭指端。</figcaption>
    </figure>
    <figure>
      <div class="畫框"><canvas id="大日" width="520" height="700" aria-label="大日如來金剛界坐像"></canvas></div>
      <figcaption><b>二 · 大日如來（金剛界）</b>菩薩形，五智寶冠；智拳印當胸，結跏趺坐月輪蓮座。</figcaption>
    </figure>
    <figure>
      <div class="畫框"><canvas id="薩埵" width="520" height="700" aria-label="金剛薩埵坐像"></canvas></div>
      <figcaption><b>三 · 金剛薩埵</b>五佛冠；右手五鈷杵當胸，左手五鈷鈴安股，結跏趺坐月輪蓮座。</figcaption>
    </figure>
    <figure>
      <div class="畫框"><canvas id="五鈷" width="520" height="700" aria-label="五鈷杵三昧耶形獨幅"></canvas></div>
      <figcaption><b>四 · 五鈷杵三昧耶形</b>把、鬼目、蓮弁帯、中鈷與四脇鈷皆具；兩端鏡成，豎立月輪蓮座中。</figcaption>
    </figure>
  </section>

  <footer>遠者先落，近者先以 <code>destination-out</code> 鑿去下線而後描；②③格網錨、①拄接距、④兩端對稱皆於載入時以 <code>console.assert</code> 自證。</footer>
</main>

<script>
(() => {
  'use strict';

  const W = 520, H = 700, 墨 = '#292620';
  const 粗 = 2.9, 中 = 2.15, 細 = 1.35, 鑿寬 = 8.5;
  const 報 = { 斷言: 0, 鑿: 0, 失: 0 };

  function 證(名, 真) {
    報.斷言++;
    if (!真) 報.失++;
    console.assert(真, 名);
  }

  function 備紙(id, 畫) {
    const c = document.getElementById(id);
    const dpr = Math.min(2, Math.max(1, devicePixelRatio || 1));
    c.width = W * dpr; c.height = H * dpr;
    const x = c.getContext('2d');
    x.setTransform(dpr, 0, 0, dpr, 0, 0);
    x.clearRect(0, 0, W, H);
    x.strokeStyle = 墨; x.lineCap = 'round'; x.lineJoin = 'round';
    畫(x);
  }

  function 描(x, 筆, 路, 虛線) {
    x.save(); x.globalCompositeOperation = 'source-over'; x.strokeStyle = 墨;
    x.lineWidth = 筆; x.lineCap = 'round'; x.lineJoin = 'round';
    if (虛線) x.setLineDash(虛線);
    x.beginPath(); 路(x); x.stroke(); x.restore();
  }
  function 線(x, ax, ay, bx, by, 筆 = 細) { 描(x, 筆, p => { p.moveTo(ax, ay); p.lineTo(bx, by); }); }
  function 橢(x, cx, cy, rx, ry, 筆 = 中, 轉 = 0, 始 = 0, 終 = Math.PI * 2) {
    描(x, 筆, p => p.ellipse(cx, cy, rx, ry, 轉, 始, 終));
  }
  function 鑿線(x, 筆, 路) {
    報.鑿++;
    x.save(); x.globalCompositeOperation = 'destination-out'; x.strokeStyle = '#000';
    x.lineWidth = 筆; x.lineCap = 'round'; x.lineJoin = 'round';
    x.beginPath(); 路(x); x.stroke(); x.restore();
  }
  function 鑿形(x, 路) {
    報.鑿++;
    x.save(); x.globalCompositeOperation = 'destination-out'; x.beginPath(); 路(x); x.fill(); x.restore();
  }
  function 鑿橢(x, cx, cy, rx, ry, 轉 = 0) {
    鑿形(x, p => p.ellipse(cx, cy, rx, ry, 轉, 0, Math.PI * 2));
  }
  function 多線(x, 點, 筆 = 細, 閉 = false) {
    描(x, 筆, p => {
      p.moveTo(點[0][0], 點[0][1]);
      for (let i = 1; i < 點.length; i++) p.lineTo(點[i][0], 點[i][1]);
      if (閉) p.closePath();
    });
  }
  function 玉(x, cx, cy, r = 3.2, 筆 = 細) { 橢(x, cx, cy, r, r, 筆); }

  /* T1419 百二十指制：兩坐尊只共享尺度，不共享姿勢座標。 */
  function 格網(名) {
    const u = 6.8, cx = 260, top = 108;
    const A = {
      名, u, cx,
      頂: top,
      白毫: top + 12 * u,
      頦: top + 20 * u,
      頸底: top + 24 * u,
      心窩: top + 36 * u,
      臍: top + 48 * u,
      盤線: top + 64 * u,
      座面: top + 68 * u,
      左膝: cx - 26 * u,
      右膝: cx + 26 * u
    };
    證(`${名}：頂0`, A.頂 === top);
    證(`${名}：白毫12`, Math.abs(A.白毫 - A.頂 - 12 * u) < 1e-9);
    證(`${名}：頦20`, Math.abs(A.頦 - A.頂 - 20 * u) < 1e-9);
    證(`${名}：頸底24`, Math.abs(A.頸底 - A.頂 - 24 * u) < 1e-9);
    證(`${名}：心窩36`, Math.abs(A.心窩 - A.頂 - 36 * u) < 1e-9);
    證(`${名}：臍48`, Math.abs(A.臍 - A.頂 - 48 * u) < 1e-9);
    證(`${名}：盤線64`, Math.abs(A.盤線 - A.頂 - 64 * u) < 1e-9);
    證(`${名}：座面68`, Math.abs(A.座面 - A.頂 - 68 * u) < 1e-9);
    證(`${名}：膝寬52`, Math.abs(A.右膝 - A.左膝 - 52 * u) < 1e-9);
    證(`${名}：線身比在律內`, (A.座面 - A.頂) / 粗 >= 100 && (A.座面 - A.頂) / 粗 <= 200);
    return A;
  }

  function 月輪(x, cx = 260, cy = 327, r = 245) {
    橢(x, cx, cy, r, r, 中);
    橢(x, cx, cy, r - 9, r - 9, 細);
  }

  function 蓮瓣(x, cx, 基, 尖, 半寬, 筆 = 細) {
    描(x, 筆, p => {
      p.moveTo(cx - 半寬, 基);
      p.bezierCurveTo(cx - 半寬 * .92, 基 + (尖 - 基) * .32, cx - 半寬 * .28, 尖 + (基 - 尖) * .12, cx, 尖);
      p.bezierCurveTo(cx + 半寬 * .28, 尖 + (基 - 尖) * .12, cx + 半寬 * .92, 基 + (尖 - 基) * .32, cx + 半寬, 基);
      p.quadraticCurveTo(cx, 基 + (尖 - 基) * .12, cx - 半寬, 基);
    });
    描(x, 細, p => {
      p.moveTo(cx, 尖 + (基 - 尖) * .18);
      p.quadraticCurveTo(cx + 半寬 * .16, (基 + 尖) / 2, cx, 基 + (尖 - 基) * .06);
    });
  }

  function 蓮座(x, 座面 = 570, 寬 = 420) {
    const cx = 260;
    橢(x, cx, 座面 + 4, 寬 / 2, 14, 中);
    描(x, 細, p => { p.moveTo(cx - 寬 * .46, 座面 + 6); p.bezierCurveTo(cx - 95, 座面 + 22, cx + 95, 座面 + 22, cx + 寬 * .46, 座面 + 6); });
    const 上數 = 11, 上跨 = 寬 * .82;
    for (let i = 0; i < 上數; i++) {
      const t = i / (上數 - 1), px = cx - 上跨 / 2 + t * 上跨;
      const 高 = 31 + 9 * Math.cos((t - .5) * Math.PI);
      蓮瓣(x, px, 座面 + 51, 座面 + 51 - 高, 17, i === 5 ? 中 : 細);
    }
    橢(x, cx, 座面 + 50, 寬 * .455, 13, 中);
    橢(x, cx, 座面 + 61, 寬 * .44, 11, 細);
    const 下數 = 12, 下跨 = 寬 * .79;
    for (let i = 0; i < 下數; i++) {
      const t = i / (下數 - 1), px = cx - 下跨 / 2 + t * 下跨;
      const 深 = 36 + 9 * Math.cos((t - .5) * Math.PI);
      蓮瓣(x, px, 座面 + 63, 座面 + 63 + 深, 16, 細);
    }
    描(x, 中, p => { p.moveTo(cx - 寬 * .38, 座面 + 110); p.quadraticCurveTo(cx, 座面 + 121, cx + 寬 * .38, 座面 + 110); });
    描(x, 細, p => { p.moveTo(cx - 寬 * .34, 座面 + 119); p.quadraticCurveTo(cx, 座面 + 128, cx + 寬 * .34, 座面 + 119); });
  }

  function 鑿坐尊輪廓(x, A) {
    鑿橢(x, A.cx, (A.頂 + A.頦) / 2, 58, 75);
    鑿形(x, p => {
      p.moveTo(178, 48); p.lineTo(342, 48); p.lineTo(345, 130); p.lineTo(175, 130); p.closePath();
    });
    鑿形(x, p => {
      p.moveTo(210, A.頦 - 2); p.lineTo(310, A.頦 - 2);
      p.lineTo(375, 285); p.lineTo(391, 402); p.lineTo(447, 547);
      p.lineTo(430, 581); p.lineTo(90, 581); p.lineTo(73, 547);
      p.lineTo(129, 402); p.lineTo(145, 285); p.closePath();
    });
  }

  function 身衣(x, A, 式) {
    const c = A.cx;
    /* 肩—肘—腕之杆勢先立，外輪廓後以褶承體。 */
    描(x, 粗, p => {
      p.moveTo(c - 23, A.頸底); p.bezierCurveTo(c - 60, 270, 172, 275, 155, 294);
      p.bezierCurveTo(143, 320, 144, 375, 132, 419);
      p.bezierCurveTo(121, 463, 104, 508, A.左膝, A.盤線);
      p.bezierCurveTo(108, 558, 166, 563, c, A.座面);
    });
    描(x, 粗, p => {
      p.moveTo(c + 23, A.頸底); p.bezierCurveTo(c + 60, 270, 348, 275, 365, 294);
      p.bezierCurveTo(377, 320, 376, 375, 388, 419);
      p.bezierCurveTo(399, 463, 416, 508, A.右膝, A.盤線);
      p.bezierCurveTo(412, 558, 354, 563, c, A.座面);
    });
    描(x, 中, p => {
      p.moveTo(181, 286); p.bezierCurveTo(200, 305, 219, 328, 237, A.臍);
      p.quadraticCurveTo(c, A.臍 + 10, 283, A.臍);
      p.bezierCurveTo(303, 326, 320, 304, 339, 286);
    });
    描(x, 細, p => { p.moveTo(c - 21, A.頸底 + 2); p.quadraticCurveTo(c - 43, 293, c - 49, 326); });
    描(x, 細, p => { p.moveTo(c + 21, A.頸底 + 2); p.quadraticCurveTo(c + 43, 293, c + 49, 326); });
    /* 腰與結跏趺之股棚。 */
    描(x, 中, p => { p.moveTo(183, A.臍); p.quadraticCurveTo(c, A.臍 + 13, 337, A.臍); });
    描(x, 細, p => { p.moveTo(190, A.臍 + 9); p.quadraticCurveTo(c, A.臍 + 22, 330, A.臍 + 9); });
    描(x, 粗, p => {
      p.moveTo(c, A.臍 + 13); p.bezierCurveTo(221, 466, 175, 505, A.左膝, A.盤線);
      p.bezierCurveTo(149, 548, 211, 549, c, A.座面 - 4);
    });
    描(x, 粗, p => {
      p.moveTo(c, A.臍 + 13); p.bezierCurveTo(299, 466, 345, 505, A.右膝, A.盤線);
      p.bezierCurveTo(371, 548, 309, 549, c, A.座面 - 4);
    });
    /* 兩足露於對股，足趾簡而逐列。 */
    描(x, 中, p => { p.moveTo(143, 526); p.bezierCurveTo(163, 509, 195, 506, 223, 516); p.bezierCurveTo(239, 522, 238, 536, 219, 540); p.bezierCurveTo(188, 545, 158, 540, 143, 526); });
    描(x, 中, p => { p.moveTo(377, 526); p.bezierCurveTo(357, 509, 325, 506, 297, 516); p.bezierCurveTo(281, 522, 282, 536, 301, 540); p.bezierCurveTo(332, 545, 362, 540, 377, 526); });
    for (let i = 0; i < 4; i++) {
      描(x, 細, p => { p.moveTo(166 + i * 14, 518 - i * .8); p.quadraticCurveTo(170 + i * 14, 526, 168 + i * 14, 535); });
      描(x, 細, p => { p.moveTo(354 - i * 14, 518 - i * .8); p.quadraticCurveTo(350 - i * 14, 526, 352 - i * 14, 535); });
    }
    /* 褶線自腰、膝、踝三處發，不作交叉網格。 */
    const 左褶 = [[252,451,205,493,126,535],[246,458,202,512,171,548],[231,461,195,480,159,499]];
    const 右褶 = 左褶.map(a => [W-a[0],a[1],W-a[2],a[3],W-a[4],a[5]]);
    [...左褶, ...右褶].forEach(a => 描(x, 細, p => { p.moveTo(a[0],a[1]); p.quadraticCurveTo(a[2],a[3],a[4],a[5]); }));
    描(x, 細, p => { p.moveTo(c, 462); p.bezierCurveTo(246, 492, 247, 523, c, 558); });
    描(x, 細, p => { p.moveTo(c, 462); p.bezierCurveTo(274, 492, 273, 523, c, 558); });
    if (式 === '大日') {
      /* 菩薩瓔珞：只以輪廓線，不填。 */
      描(x, 細, p => { p.moveTo(215, 294); p.quadraticCurveTo(c, 333, 305, 294); });
      描(x, 細, p => { p.moveTo(224, 301); p.quadraticCurveTo(c, 348, 296, 301); });
      玉(x, c, 340, 5, 細);
    } else {
      描(x, 細, p => { p.moveTo(218, 296); p.quadraticCurveTo(c, 326, 302, 296); });
      描(x, 細, p => { p.moveTo(231, 304); p.quadraticCurveTo(c, 343, 289, 304); });
      玉(x, c, 335, 4.5, 細);
    }
  }

  function 面與髮(x, A) {
    const c = A.cx;
    描(x, 粗, p => {
      p.moveTo(c, A.頂); p.bezierCurveTo(c - 39, A.頂 + 1, c - 52, A.頂 + 34, c - 50, A.頂 + 76);
      p.bezierCurveTo(c - 47, A.頂 + 108, c - 22, A.頦 - 3, c, A.頦);
      p.bezierCurveTo(c + 22, A.頦 - 3, c + 47, A.頂 + 108, c + 50, A.頂 + 76);
      p.bezierCurveTo(c + 52, A.頂 + 34, c + 39, A.頂 + 1, c, A.頂);
    });
    描(x, 中, p => { p.moveTo(c - 48, A.頂 + 34); p.quadraticCurveTo(c, A.頂 + 7, c + 48, A.頂 + 34); });
    描(x, 細, p => { p.moveTo(c - 46, A.頂 + 45); p.quadraticCurveTo(c, A.頂 + 19, c + 46, A.頂 + 45); });
    /* 耳與垂璫。 */
    for (const s of [-1,1]) {
      描(x, 細, p => { p.moveTo(c + s*49, A.頂+55); p.bezierCurveTo(c+s*67,A.頂+54,c+s*66,A.頂+94,c+s*50,A.頂+105); });
      描(x, 細, p => { p.moveTo(c + s*55, A.頂+68); p.quadraticCurveTo(c+s*59,A.頂+81,c+s*51,A.頂+91); });
      玉(x, c+s*58, A.頂+111, 4, 細);
      描(x, 細, p => { p.moveTo(c+s*58,A.頂+115); p.quadraticCurveTo(c+s*64,A.頂+126,c+s*57,A.頂+137); });
    }
    /* 半闔眼、眉、鼻、口；白毫恰在十二指錨。 */
    玉(x, c, A.白毫, 3.2, 中);
    描(x, 細, p => { p.moveTo(c-35,A.白毫+1); p.quadraticCurveTo(c-20,A.白毫-8,c-7,A.白毫-2); });
    描(x, 細, p => { p.moveTo(c+35,A.白毫+1); p.quadraticCurveTo(c+20,A.白毫-8,c+7,A.白毫-2); });
    描(x, 中, p => { p.moveTo(c-34,A.白毫+10); p.quadraticCurveTo(c-22,A.白毫+18,c-8,A.白毫+11); });
    描(x, 中, p => { p.moveTo(c+34,A.白毫+10); p.quadraticCurveTo(c+22,A.白毫+18,c+8,A.白毫+11); });
    描(x, 細, p => { p.moveTo(c,A.白毫+6); p.bezierCurveTo(c-2,A.白毫+19,c-5,A.白毫+28,c-10,A.白毫+35); p.quadraticCurveTo(c,A.白毫+40,c+9,A.白毫+35); });
    描(x, 細, p => { p.moveTo(c-16,A.白毫+50); p.quadraticCurveTo(c,A.白毫+58,c+16,A.白毫+50); });
    描(x, 細, p => { p.moveTo(c-10,A.白毫+58); p.quadraticCurveTo(c,A.白毫+63,c+10,A.白毫+58); });
    線(x, c-20, A.頦, c-20, A.頸底, 中); 線(x, c+20, A.頦, c+20, A.頸底, 中);
    描(x, 細, p => { p.moveTo(c-20,A.頸底-2); p.quadraticCurveTo(c,A.頸底+12,c+20,A.頸底-2); });
  }

  function 五智寶冠(x, A) {
    const c = A.cx, xs = [-68,-34,0,34,68], hs = [43,57,72,57,43];
    描(x, 中, p => { p.moveTo(c-87,A.頂+5); p.quadraticCurveTo(c,A.頂+19,c+87,A.頂+5); });
    描(x, 細, p => { p.moveTo(c-84,A.頂-7); p.quadraticCurveTo(c,A.頂+6,c+84,A.頂-7); });
    xs.forEach((dx,i) => {
      const base = A.頂-4, tip = base-hs[i], hw = i===2 ? 17 : 15;
      描(x, i===2?中:細, p => {
        p.moveTo(c+dx-hw,base); p.bezierCurveTo(c+dx-hw,base-18,c+dx-7,tip+12,c+dx,tip);
